<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數線跳跳糖</title>
    <!-- 引入 Tailwind CSS (用於排版與多巴胺配色) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome (用於圖示) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入 Canvas Confetti (用於答對時的碎紙花特效) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* 自訂彈跳動畫 */
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .animate-bounce-slow {
            animation: bounce-slow 1.6s infinite ease-in-out;
        }
        
        /* 隱藏捲軸但保持可滑動，確保手機友善 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 背景氣泡飄浮動畫 */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.45);
            bottom: -150px;
            animation: float 15s infinite ease-in-out;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            50% { transform: translateY(-60vh) translateX(50px) rotate(180deg); opacity: 0.6; border-radius: 50%; }
            100% { transform: translateY(-120vh) translateX(-50px) rotate(360deg); opacity: 0; }
        }

        /* 簡單的淡入動畫 */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100 text-gray-800 min-h-screen relative overflow-x-hidden flex flex-col justify-between">

    <!-- 背景氣泡層 -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="bubble w-12 h-12 left-10" style="animation-delay: 0s; animation-duration: 12s;"></div>
        <div class="bubble w-20 h-20 left-1/4" style="animation-delay: 2s; animation-duration: 18s;"></div>
        <div class="bubble w-16 h-16 left-1/2" style="animation-delay: 4s; animation-duration: 14s;"></div>
        <div class="bubble w-24 h-24 left-3/4" style="animation-delay: 1s; animation-duration: 20s;"></div>
        <div class="bubble w-10 h-10 left-[90%]" style="animation-delay: 6s; animation-duration: 10s;"></div>
    </div>

    <!-- 主要應用程式容器 -->
    <div id="app" class="w-full flex-grow flex flex-col items-center p-4 z-10 relative"></div>

    <!-- API Key 設定彈窗 -->
    <div id="settings-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl border border-slate-100 animate-fade-in text-left">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-gear text-slate-500"></i> 設定 Gemini API Key
                </h3>
                <button onclick="toggleSettingsModal()" class="text-slate-400 hover:text-slate-600">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <p class="text-slate-500 text-sm mb-4 leading-relaxed font-medium">
                「AI 老師求解」功能需要使用 Gemini API。金鑰將儲存於您的瀏覽器中，不會上傳至其他伺服器。
            </p>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Gemini API Key</label>
                    <input type="password" id="api-key-input" placeholder="貼上您的 API Key (AIzaSy...)" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-400 font-mono text-sm" />
                </div>
                <div class="flex gap-3">
                    <button onclick="saveApiKey()" class="flex-1 bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 rounded-xl shadow-md transition">
                        儲存設定
                    </button>
                    <button onclick="clearApiKey()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-xl transition">
                        清除金鑰
                    </button>
                </div>
                <p class="text-xs text-slate-400 text-center">
                    沒有金鑰？可至 Google AI Studio 免費申請。
                </p>
            </div>
        </div>
    </div>

    <script>
        // -----------------------------------------------------------------------------
        // 應用程式狀態管理
        // -----------------------------------------------------------------------------
        let state = {
            gameState: 'start', // 'start' 或 'playing'
            mode: 'mixed',      // 'decimal', 'fraction', 'mixed'
            question: null,
            score: 0,
            streak: 0,
            feedback: null      // null, 'correct', 'incorrect'
        };

        // AI Tutor 狀態
        let aiExplanation = null;
        let aiLoading = false;
        let isSpeaking = false;
        let currentUtterance = null;

        // -----------------------------------------------------------------------------
        // API Key 管理
        // -----------------------------------------------------------------------------
        function getApiKey() {
            return localStorage.getItem('gemini_api_key') || '';
        }

        function toggleSettingsModal() {
            const modal = document.getElementById('settings-modal');
            const input = document.getElementById('api-key-input');
            input.value = getApiKey();
            modal.classList.toggle('hidden');
        }

        function saveApiKey() {
            const input = document.getElementById('api-key-input');
            const key = input.value.trim();
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                alert('API Key 儲存成功！');
            } else {
                localStorage.removeItem('gemini_api_key');
                alert('已清除 API Key。');
            }
            toggleSettingsModal();
            render();
        }

        function clearApiKey() {
            localStorage.removeItem('gemini_api_key');
            const input = document.getElementById('api-key-input');
            input.value = '';
            alert('已清除 API Key。');
            toggleSettingsModal();
            render();
        }

        // -----------------------------------------------------------------------------
        // 資料生成邏輯 (數學題目產生器)
        // -----------------------------------------------------------------------------
        const generateQuestion = (mode) => {
            let type = mode;
            if (mode === 'mixed') {
                type = Math.random() > 0.5 ? 'decimal' : 'fraction';
            }

            let start = 0;
            let end = 1;
            let divisions, targetIndex, answer, displayAnswer;
            const optionsSet = new Set();

            if (type === 'decimal') {
                divisions = 10;
                targetIndex = Math.floor(Math.random() * (divisions - 1)) + 1; 
                
                let val = targetIndex / divisions;
                answer = val.toFixed(1);
                displayAnswer = answer;
                optionsSet.add(displayAnswer);

                while (optionsSet.size < 4) {
                    const r = Math.random();
                    let candidate;
                    
                    if (r < 0.33) {
                        let t = targetIndex + 1;
                        if (t >= divisions) t = targetIndex - 2;
                        candidate = (t / divisions).toFixed(1);
                    } else if (r < 0.66) {
                        let t = targetIndex - 1;
                        if (t <= 0) t = targetIndex + 2;
                        candidate = (t / divisions).toFixed(1);
                    } else {
                        const randIndex = Math.floor(Math.random() * (divisions - 1)) + 1;
                        candidate = (randIndex / divisions).toFixed(1);
                    }
                    optionsSet.add(candidate);
                }
            } else {
                const denominators = [3, 4, 5, 6, 8, 10];
                const den = denominators[Math.floor(Math.random() * denominators.length)];
                divisions = den;
                targetIndex = Math.floor(Math.random() * (den - 1)) + 1;

                displayAnswer = `${targetIndex}/${den}`;
                optionsSet.add(displayAnswer);

                let attempts = 0;
                while (optionsSet.size < 4 && attempts < 20) {
                    attempts++;
                    let candidate;
                    const r = Math.random();

                    if (r < 0.4) {
                        let n = Math.floor(Math.random() * (den - 1)) + 1;
                        candidate = `${n}/${den}`;
                    } else if (r < 0.7) {
                         let d = den + (Math.random() > 0.5 ? 1 : -1);
                         if (d < 3) d = 3; 
                         candidate = `${targetIndex}/${d}`;
                    } else {
                        let n = den - targetIndex;
                        candidate = `${n}/${den}`;
                    }
                    optionsSet.add(candidate);
                }
                
                while (optionsSet.size < 4) {
                    const randDen = denominators[Math.floor(Math.random() * denominators.length)];
                    const randNum = Math.floor(Math.random() * (randDen - 1)) + 1;
                    optionsSet.add(`${randNum}/${randDen}`);
                }
            }

            const options = Array.from(optionsSet);
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }

            return {
                type, start, end, divisions, targetIndex,
                correctAnswer: displayAnswer,
                options,
                hint: type === 'decimal' 
                  ? `數數看，0 到 1 之間被分成了 ${divisions} 格，每一格代表 0.1 喔！` 
                  : `數數看，0 到 1 之間被分成了 ${divisions} 格，分母就是 ${divisions}！`
            };
        };

        // -----------------------------------------------------------------------------
        // AI 老師引導解題
        // -----------------------------------------------------------------------------
        async function callGeminiAPI(prompt, apiKey, retries = 3, delay = 1000) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }] };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`API call failed: ${response.status}`);
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，AI 老師現在有點忙，請稍後再試。";
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay * Math.pow(2, i)));
                }
            }
        }

        async function handleAskAI() {
            const key = getApiKey();
            if (!key) {
                alert('請點選右上角齒輪設定 Gemini API Key，即可使用 AI 老師小撇步！');
                toggleSettingsModal();
                return;
            }

            aiLoading = true;
            aiExplanation = null;
            render();

            const q = state.question;
            const prompt = `你現在是一位超級會教數學的國小老師。請根據以下資訊，引導學生在數線上找到正確的值：
            【題目資訊】
            - 適合年級：國小三年級或四年級
            - 數線起點：${q.start}
            - 數線終點：${q.end}
            - 數線等分數（格子數）：${q.divisions}
            - 目標位置在第幾個刻度（從起點算起，0開頭）：${q.targetIndex}
            - 目標的正確答案：${q.correctAnswer}
            - 題目類型：${q.type === 'decimal' ? '小數' : '分數'}

            【你的任務】
            1. 請使用國小三年級（8-9歲）聽得懂的簡單詞彙，語氣要非常可愛、活潑且親切。
            2. 請「不要」直接給出計算結果或最終答案。
            3. 你的重點是引導學生觀察數線上的刻度：
               - "我們一起數數看，從 0 到 1 總共被分成了幾格呢？"
               - "分成了幾格，就代表每一小格是多大喔！"
               - "小跳跳糖現在站在第幾格的位置呢？我們一起從 0 開始往右數..."
            4. 輸出格式請包含適當的換行和 emoji，讓版面好讀。
            5. 最後給學生一個溫暖的鼓勵。
            請用繁體中文回答。`;

            try {
                const result = await callGeminiAPI(prompt, key);
                aiExplanation = result;
            } catch (error) {
                aiExplanation = "抱歉，連線好像有點不穩，請再次檢查 API Key 是否正確。";
            } finally {
                aiLoading = false;
                render();
            }
        }

        function handleSpeak() {
            if (isSpeaking) {
                window.speechSynthesis.cancel();
                isSpeaking = false;
                render();
            } else {
                if (!aiExplanation) return;
                const cleanText = aiExplanation.replace(/[\*#_`~]/g, '');
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'zh-TW';
                utterance.rate = 0.95;
                utterance.onend = () => {
                    isSpeaking = false;
                    render();
                };
                utterance.onerror = () => {
                    isSpeaking = false;
                    render();
                };
                window.speechSynthesis.speak(utterance);
                isSpeaking = true;
                currentUtterance = utterance;
                render();
            }
        }

        // -----------------------------------------------------------------------------
        // 遊戲流程控制
        // -----------------------------------------------------------------------------
        window.startGame = function(selectedMode) {
            state.mode = selectedMode;
            state.score = 0;
            state.streak = 0;
            state.gameState = 'playing';
            
            aiExplanation = null;
            aiLoading = false;
            isSpeaking = false;
            window.speechSynthesis.cancel();
            
            nextQuestion();
        };

        window.nextQuestion = function() {
            state.feedback = null;
            state.question = generateQuestion(state.mode);
            
            // 重設 AI 狀態
            aiExplanation = null;
            aiLoading = false;
            isSpeaking = false;
            window.speechSynthesis.cancel();

            render();
        };

        window.quitGame = function() {
            state.gameState = 'start';
            window.speechSynthesis.cancel();
            isSpeaking = false;
            render();
        };

        window.handleAnswer = function(selectedOption) {
            if (state.feedback) return; // 防止重複點擊

            const isCorrect = selectedOption === state.question.correctAnswer;
            
            if (isCorrect) {
                state.feedback = 'correct';
                state.score += 10;
                state.streak += 1;
                
                // 觸發碎紙花特效
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#F472B6', '#34D399', '#60A5FA', '#FBBF24']
                });
                
                render();
                
                setTimeout(() => {
                    nextQuestion();
                }, 1500);
            } else {
                state.feedback = 'incorrect';
                state.streak = 0;
                render();
            }
        };

        // -----------------------------------------------------------------------------
        // 畫面渲染邏輯 (UI)
        // -----------------------------------------------------------------------------
        function renderStartScreen() {
            return `
            <div class="min-h-[85vh] flex flex-col items-center justify-center p-4 w-full max-w-lg mx-auto fade-in">
                <!-- 設定按鈕 -->
                <button onclick="toggleSettingsModal()" class="absolute top-4 right-4 bg-white p-3 rounded-full text-slate-500 hover:text-slate-700 shadow-sm border border-slate-100 transition hover:rotate-45 duration-300 z-50" title="API 設定">
                    <i class="fa-solid fa-gear text-xl"></i>
                </button>

                <div class="bg-white p-8 rounded-[2rem] shadow-xl border-b-8 border-indigo-200 w-full text-center relative overflow-hidden">
                    <div class="absolute -top-12 -left-12 w-24 h-24 bg-pink-100 rounded-full opacity-50"></div>
                    <div class="absolute -bottom-12 -right-12 w-32 h-32 bg-indigo-100 rounded-full opacity-50"></div>

                    <div class="mb-6 flex justify-center relative">
                         <div class="bg-gradient-to-tr from-yellow-300 to-amber-400 w-24 h-24 rounded-full flex items-center justify-center shadow-lg text-white text-5xl animate-bounce-slow">
                            <i class="fa-solid fa-cookie-bite"></i>
                         </div>
                    </div>
                    
                    <h1 class="text-5xl font-black mb-3 text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 tracking-tight">數線跳跳糖</h1>
                    <p class="text-gray-500 mb-8 font-medium text-lg">林老師的數線大冒險 (AI 互動版)</p>

                    <div class="space-y-4 relative z-10">
                        <button onclick="startGame('decimal')" class="w-full py-4 px-6 bg-gradient-to-r from-cyan-400 to-blue-500 hover:brightness-105 text-white rounded-2xl font-bold text-xl shadow-md transform transition active:scale-95 flex items-center justify-center gap-3">
                            <div class="bg-white/20 px-3 py-1 rounded-xl text-sm font-black">0.1</div>
                            小數練習
                        </button>
                        <button onclick="startGame('fraction')" class="w-full py-4 px-6 bg-gradient-to-r from-violet-400 to-indigo-500 hover:brightness-105 text-white rounded-2xl font-bold text-xl shadow-md transform transition active:scale-95 flex items-center justify-center gap-3">
                            <div class="bg-white/20 px-3 py-1 rounded-xl text-sm font-black">1/2</div>
                            分數練習
                        </button>
                        <button onclick="startGame('mixed')" class="w-full py-4 px-6 bg-gradient-to-r from-pink-400 to-rose-500 hover:brightness-105 text-white rounded-2xl font-bold text-xl shadow-md transform transition active:scale-95 flex items-center justify-center gap-3">
                            <i class="fa-solid fa-wand-magic-sparkles text-white"></i>
                            綜合挑戰
                        </button>
                    </div>
                </div>
                
                <p class="mt-8 text-gray-400 text-sm font-bold bg-white/50 px-4 py-2 rounded-full border border-white/40">適用年級：國小三、四年級</p>

                <!-- 設計者頁尾 -->
                <footer class="mt-12 text-center text-xs text-slate-400">
                    設計者：國立屏科實驗高級中等學校(國小部) 林敬修老師
                </footer>
            </div>
            `;
        }

        function renderGameScreen() {
            const q = state.question;
            
            // 生成選項按鈕
            let optionsHTML = '';
            q.options.forEach(opt => {
                let btnColor = "bg-white border-slate-100 text-slate-600 hover:border-indigo-300 hover:text-indigo-500";
                let interactionClasses = "active:scale-95 hover:-translate-y-1 hover:shadow-md cursor-pointer";

                if (state.feedback === 'correct' && opt === q.correctAnswer) {
                    btnColor = "bg-green-400 border-green-600 text-white scale-105 ring-4 ring-green-100";
                    interactionClasses = "cursor-default";
                } else if (state.feedback === 'incorrect' && opt !== q.correctAnswer) {
                    btnColor = "bg-slate-100 border-slate-200 text-slate-400 cursor-not-allowed";
                    interactionClasses = "";
                } else if (state.feedback === 'correct') {
                    btnColor = "bg-slate-100 border-slate-200 text-slate-300";
                    interactionClasses = "cursor-default opacity-50";
                }

                optionsHTML += `
                    <button 
                        onclick="handleAnswer('${opt}')" 
                        ${state.feedback === 'correct' ? 'disabled' : ''}
                        class="h-24 rounded-2xl border-b-4 text-3xl font-black shadow-sm transition-all duration-200 flex items-center justify-center ${btnColor} ${interactionClasses}"
                    >
                        ${opt}
                    </button>
                `;
            });

            // 提示訊息區塊
            let hintHTML = '';
            if (state.feedback === 'incorrect') {
                hintHTML = `
                    <div class="bg-red-50 p-4 mx-4 mb-4 rounded-2xl border border-red-100 flex items-start gap-3 animate-pulse text-left">
                        <div class="bg-red-200 w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-full text-red-600 font-bold">?</div>
                        <p class="text-red-600 font-medium text-lg mt-0.5">${q.hint}</p>
                    </div>
                `;
            }

            // 正確答案祝賀彈出視窗
            let toastHTML = '';
            if (state.feedback === 'correct') {
                toastHTML = `
                    <div class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-green-400 to-emerald-500 text-white px-8 py-4 rounded-full shadow-2xl font-bold text-xl flex items-center gap-3 animate-bounce z-50">
                        <i class="fa-solid fa-circle-check text-yellow-200 text-2xl"></i>
                        太棒了！答對了！
                    </div>
                `;
            }

            // AI Tutor 區塊
            let aiTutorHTML = '';
            if (!aiExplanation && !aiLoading) {
                aiTutorHTML = `
                    <button onclick="handleAskAI()" class="w-full bg-gradient-to-r from-purple-400 to-pink-400 text-white font-bold py-3.5 px-6 rounded-2xl shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                      <i class="fa-solid fa-wand-magic-sparkles animate-pulse"></i>
                      <span>✨ 呼叫 AI 老師求解</span>
                    </button>
                `;
            } else if (aiLoading) {
                aiTutorHTML = `
                    <div class="w-full bg-white p-4 rounded-2xl shadow-sm border border-purple-100 flex items-center justify-center space-x-3 animate-pulse">
                      <div class="w-3 h-3 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                      <div class="w-3 h-3 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                      <div class="w-3 h-3 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                      <span class="text-purple-500 font-medium">AI 老師正在分析數線...</span>
                    </div>
                `;
            } else if (aiExplanation) {
                aiTutorHTML = `
                    <div class="w-full bg-white p-6 rounded-2xl shadow-md border-l-4 border-purple-400 animate-fade-in relative text-left">
                      <div class="flex justify-between items-start mb-2">
                         <h4 class="font-bold text-purple-600 flex items-center gap-1.5">
                           <i class="fa-solid fa-wand-magic-sparkles"></i> AI 老師的小撇步
                         </h4>
                         <button onclick="handleSpeak()" class="text-slate-400 hover:text-purple-500 transition-colors" title="朗讀解釋">
                           ${isSpeaking ? '<i class="fa-solid fa-circle-stop text-2xl text-red-500"></i>' : '<i class="fa-solid fa-volume-high text-xl"></i>'}
                         </button>
                      </div>
                      <p class="text-slate-600 leading-relaxed whitespace-pre-wrap text-sm md:text-base">
                        ${aiExplanation}
                      </p>
                    </div>
                `;
            }

            return `
            <div class="w-full max-w-4xl flex flex-col items-center fade-in">
                <!-- 頂部資訊列 -->
                <div class="w-full flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border border-indigo-100">
                    <button onclick="quitGame()" class="text-gray-400 hover:text-gray-600 flex items-center gap-2 font-bold transition">
                        <i class="fa-solid fa-arrow-left"></i> 退出
                    </button>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2 bg-yellow-100 px-4 py-2 rounded-xl text-yellow-700 font-bold">
                             <i class="fa-solid fa-trophy text-yellow-500"></i>
                             <span>${state.score}</span>
                        </div>
                        <div class="flex items-center gap-2 bg-orange-100 px-4 py-2 rounded-xl text-orange-700 font-bold">
                             <i class="fa-solid fa-award text-orange-500"></i>
                             <span>連對: ${state.streak}</span>
                        </div>
                        <button onclick="toggleSettingsModal()" class="bg-slate-50 p-2.5 rounded-xl text-slate-400 hover:text-slate-600 border border-slate-100 transition" title="API 設定">
                           <i class="fa-solid fa-gear"></i>
                        </button>
                    </div>
                </div>

                <!-- 雙欄排版 -->
                <div class="w-full grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
                    <!-- 左欄：數線區與 AI 解說區 -->
                    <div class="md:col-span-8 space-y-4">
                        <div class="w-full bg-white rounded-3xl shadow-lg border-b-8 border-indigo-200 overflow-hidden relative">
                            <div class="bg-indigo-500 p-4 text-center">
                               <h2 class="text-white text-xl font-bold tracking-wider">找出問號代表的數字！</h2>
                            </div>
                            
                            <!-- 數線 SVG 容器 -->
                            <div class="bg-white w-full overflow-x-auto flex justify-center py-10 no-scrollbar" id="number-line-container">
                                <!-- SVG 將由 JS 動態生成並插入此處 -->
                            </div>
                            
                            ${hintHTML}
                        </div>
                        
                        <!-- AI 求解區 -->
                        <div class="w-full">
                            ${aiTutorHTML}
                        </div>
                    </div>

                    <!-- 右欄：選項按鈕區 -->
                    <div class="md:col-span-4 w-full">
                        <div class="bg-white rounded-3xl p-6 shadow-lg border-b-8 border-indigo-200 flex flex-col justify-center min-h-[300px]">
                           <h3 class="text-xl font-bold text-slate-700 mb-6 text-center">請選擇正確答案</h3>
                           <div class="grid grid-cols-2 gap-4 md:grid-cols-1">
                             ${optionsHTML}
                           </div>
                        </div>
                    </div>
                </div>

                ${toastHTML}

                <!-- 設計者頁尾 -->
                <footer class="mt-12 mb-12 text-center text-xs text-slate-400">
                    設計者：國立屏科實驗高級中等學校(國小部) 林敬修老師
                </footer>
            </div>
            `;
        }

        function renderNumberLine() {
            const container = document.getElementById('number-line-container');
            if (!container || !state.question) return;

            const q = state.question;
            const width = 800;
            const height = 180;
            const padding = 70;
            const lineY = 120;
            
            const drawWidth = width - (padding * 2);
            const step = drawWidth / q.divisions;

            let svgContent = `
                <!-- 主線 -->
                <line x1="${padding - 25}" y1="${lineY}" x2="${width - padding + 25}" y2="${lineY}" stroke="#4B5563" stroke-width="4" stroke-linecap="round" />
                <!-- 箭頭 -->
                <path d="M ${width - padding + 25} ${lineY} l -12 -12 m 12 12 l -12 12" stroke="#4B5563" stroke-width="4" stroke-linecap="round" />
            `;

            for (let i = 0; i <= q.divisions; i++) {
                const x = padding + (i * step);
                const isMain = i === 0 || i === q.divisions;
                const tickHeight = isMain ? 32 : 18;
                const tickColor = isMain ? "#1F2937" : "#9CA3AF";
                const strokeWidth = isMain ? 4 : 2;

                svgContent += `
                    <g>
                        <line x1="${x}" y1="${lineY - tickHeight}" x2="${x}" y2="${lineY + tickHeight}" stroke="${tickColor}" stroke-width="${strokeWidth}" />
                `;

                if (i === 0) {
                    svgContent += `<text x="${x}" y="${lineY + 50}" text-anchor="middle" font-size="28" font-weight="900" fill="#374151">${q.start}</text>`;
                }
                if (i === q.divisions) {
                    svgContent += `<text x="${x}" y="${lineY + 50}" text-anchor="middle" font-size="28" font-weight="900" fill="#374151">${q.end}</text>`;
                }

                // 畫跳跳糖小角色 (原本是直向小矩形，改造成多巴胺繽紛糖果造型)
                if (i === q.targetIndex) {
                    svgContent += `
                        <g class="animate-bounce-slow">
                            <!-- 指示線與小箭頭 -->
                            <line x1="${x}" y1="${lineY - 10}" x2="${x}" y2="${lineY - 45}" stroke="#DB2777" stroke-width="3" stroke-dasharray="3,3" />
                            <polygon points="${x},${lineY - 8} ${x - 8},${lineY - 22} ${x + 8},${lineY - 22}" fill="#DB2777" />
                            
                            <!-- 糖果兩側蝴蝶結扭結 -->
                            <polygon points="${x - 22},${lineY - 70} ${x - 42},${lineY - 84} ${x - 42},${lineY - 56}" fill="#F472B6" stroke="#BE185D" stroke-width="2.5" />
                            <polygon points="${x + 22},${lineY - 70} ${x + 42},${lineY - 84} ${x + 42},${lineY - 56}" fill="#F472B6" stroke="#BE185D" stroke-width="2.5" />
                            
                            <!-- 糖果主體圓形 -->
                            <circle cx="${x}" cy="${lineY - 70}" r="24" fill="#F472B6" stroke="#BE185D" stroke-width="2.5" />
                            
                            <!-- 糖果的可愛表情與標示 -->
                            <circle cx="${x - 8}" cy="${lineY - 74}" r="3" fill="#5C0029" />
                            <circle cx="${x + 8}" cy="${lineY - 74}" r="3" fill="#5C0029" />
                            <path d="M ${x - 6} ${lineY - 67} Q ${x} ${lineY - 60} ${x + 6} ${lineY - 67}" fill="none" stroke="#5C0029" stroke-width="3" stroke-linecap="round" />
                            
                            <!-- 問號氣泡框 (漂浮在糖果上方) -->
                            <rect x="${x - 18}" y="${lineY - 128}" width="36" height="30" rx="8" fill="#FBBF24" stroke="#D97706" stroke-width="2" />
                            <polygon points="${x},${lineY - 94} ${x - 6},${lineY - 100} ${x + 6},${lineY - 100}" fill="#FBBF24" stroke="#D97706" stroke-width="1.5" />
                            <rect x="${x - 18}" y="${lineY - 128}" width="36" height="30" rx="8" fill="#FBBF24" />
                            <text x="${x}" y="${lineY - 106}" text-anchor="middle" font-size="20" font-weight="900" fill="#78350F">?</text>
                        </g>
                    `;
                }

                svgContent += `</g>`;
            }

            container.innerHTML = `<svg viewBox="0 0 ${width} ${height}" class="w-full max-w-3xl h-auto select-none">${svgContent}</svg>`;
        }

        // -----------------------------------------------------------------------------
        // 主渲染入口
        // -----------------------------------------------------------------------------
        function render() {
            const app = document.getElementById('app');
            if (state.gameState === 'start') {
                app.innerHTML = renderStartScreen();
            } else if (state.gameState === 'playing') {
                app.innerHTML = renderGameScreen();
                renderNumberLine(); // 渲染完 HTML 後插入 SVG 數線
            }
        }

        // 啟動應用程式
        render();

    </script>
</body>
</html>
