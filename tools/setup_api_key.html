<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔑 API Key 設定 — 林靜思數學教學</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 24px; color: #1e1b4b; margin-bottom: 8px; }
        .subtitle { color: #6b7280; font-size: 15px; margin-bottom: 32px; line-height: 1.6; }
        .status-box {
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.6;
        }
        .status-box.success {
            background: #f0fdf4;
            border: 2px solid #86efac;
            color: #16a34a;
        }
        .status-box.error {
            background: #fef2f2;
            border: 2px solid #fca5a5;
            color: #dc2626;
        }
        .key-display {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 16px;
            font-family: monospace;
            font-size: 13px;
            color: #475569;
            margin: 16px 0;
            word-break: break-all;
            text-align: left;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.15s, opacity 0.15s;
            cursor: pointer;
            border: none;
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            width: 100%;
            margin-bottom: 12px;
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            width: 100%;
        }
        .note {
            margin-top: 24px;
            font-size: 13px;
            color: #9ca3af;
            line-height: 1.7;
        }
        .tool-list {
            text-align: left;
            margin: 16px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            font-size: 13px;
            color: #4b5563;
        }
        .tool-list span::before { content: "✅ "; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon" id="main-icon">⚙️</div>
    <h1 id="main-title">正在設定 API Key…</h1>
    <p class="subtitle" id="main-subtitle">請稍候，正在將金鑰儲存至您的瀏覽器…</p>

    <div class="status-box" id="status-box" style="display:none"></div>

    <div id="actions" style="display:none">
        <button class="btn btn-secondary" onclick="clearKey()">🗑️ 清除金鑰</button>
    </div>

    <p class="note">⚠️ 此金鑰儲存於您的瀏覽器本機，不會上傳至任何伺服器。<br>此頁面下次再開啟時會自動套用已儲存的金鑰。</p>
</div>

<script>
    const API_KEY = 'AIzaSyATHUB5KZzUvwqI93x_0tzk-Afl2tAwoQY';
    const STORAGE_KEY = 'gemini_api_key';

    const TOOLS = [
        '字謎偵探', '時鐘冒險', '時鐘角度偵探', '小數偵探',
        '分數量挑戰', '幾何偵探', '成語比手畫腳', '數線糖果',
        '平行垂直挑戰', '餘數偵探', '線段圖冒險',
        '除法怪獸1', '除法怪獸2', '除法怪獸3',
        '除法怪獸4', '除法怪獸5', '除法怪獸6'
    ];

    function showSuccess() {
        document.getElementById('main-icon').textContent = '🎉';
        document.getElementById('main-title').textContent = 'API Key 設定成功！';
        document.getElementById('main-subtitle').textContent = '以下所有工具頁面已可使用 AI 功能：';

        const toolsHtml = TOOLS.map(t => `<span>${t}</span>`).join('');
        const box = document.getElementById('status-box');
        box.className = 'status-box success';
        box.innerHTML = `✅ 金鑰已成功儲存至瀏覽器！<div class="tool-list">${toolsHtml}</div>`;
        box.style.display = 'block';
        document.getElementById('actions').style.display = 'block';
    }

    function showError(msg) {
        document.getElementById('main-icon').textContent = '❌';
        document.getElementById('main-title').textContent = '設定失敗';
        document.getElementById('main-subtitle').textContent = '發生以下錯誤：';
        const box = document.getElementById('status-box');
        box.className = 'status-box error';
        box.innerHTML = msg;
        box.style.display = 'block';
    }

    function clearKey() {
        localStorage.removeItem(STORAGE_KEY);
        document.getElementById('main-icon').textContent = '🗑️';
        document.getElementById('main-title').textContent = '金鑰已清除';
        document.getElementById('main-subtitle').textContent = '所有工具頁面的 AI 功能已停用。';
        document.getElementById('status-box').style.display = 'none';
        document.getElementById('actions').style.display = 'none';
    }

    // 自動執行設定
    try {
        localStorage.setItem(STORAGE_KEY, API_KEY);
        const verify = localStorage.getItem(STORAGE_KEY);
        if (verify === API_KEY) {
            showSuccess();
        } else {
            showError('金鑰儲存後驗證失敗，請重新整理頁面再試。');
        }
    } catch (e) {
        showError(`localStorage 無法存取：${e.message}<br><br>可能原因：瀏覽器設定禁止本機儲存，請檢查隱私設定。`);
    }
</script>
</body>
</html>
