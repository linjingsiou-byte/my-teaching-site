<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學偵探社：餘數變身之謎</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入 Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 背景氣泡飄浮動畫 */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.45);
            bottom: -150px;
            animation: float 15s infinite ease-in-out;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            50% { transform: translateY(-60vh) translateX(50px) rotate(180deg); opacity: 0.6; border-radius: 50%; }
            100% { transform: translateY(-120vh) translateX(-50px) rotate(360deg); opacity: 0; }
        }

        /* 簡單的淡入動畫 */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 卡片懸浮與縮放效果 */
        .detective-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .detective-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1);
        }
        
        .icon-bounce {
            display: inline-block;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body class="bg-gradient-to-br from-cyan-100 via-sky-50 to-blue-100 text-gray-800 min-h-screen relative overflow-x-hidden flex flex-col justify-between">

    <!-- 背景氣泡層 -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="bubble w-12 h-12 left-10" style="animation-delay: 0s; animation-duration: 12s;"></div>
        <div class="bubble w-20 h-20 left-1/4" style="animation-delay: 2s; animation-duration: 18s;"></div>
        <div class="bubble w-16 h-16 left-1/2" style="animation-delay: 4s; animation-duration: 14s;"></div>
        <div class="bubble w-24 h-24 left-3/4" style="animation-delay: 1s; animation-duration: 20s;"></div>
        <div class="bubble w-10 h-10 left-[90%]" style="animation-delay: 6s; animation-duration: 10s;"></div>
    </div>

    <!-- 主要應用程式容器 -->
    <div id="app" class="w-full flex-grow flex flex-col items-center p-4 z-10 relative"></div>

    <!-- API Key 設定彈窗 -->
    <div id="settings-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl border border-slate-100 animate-fade-in text-left">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-gear text-slate-500"></i> 設定 Gemini API Key
                </h3>
                <button onclick="toggleSettingsModal()" class="text-slate-400 hover:text-slate-600">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <p class="text-slate-500 text-sm mb-4 leading-relaxed font-medium">
                「總部探長助教」功能需要使用 Gemini API。金鑰將儲存於您的瀏覽器中，不會上傳至其他伺服器。
            </p>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Gemini API Key</label>
                    <input type="password" id="api-key-input" placeholder="貼上您的 API Key (AIzaSy...)" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-400 font-mono text-sm" />
                </div>
                <div class="flex gap-3">
                    <button onclick="saveApiKey()" class="flex-1 bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 rounded-xl shadow-md transition">
                        儲存設定
                    </button>
                    <button onclick="clearApiKey()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-xl transition">
                        清除金鑰
                    </button>
                </div>
                <p class="text-xs text-slate-400 text-center">
                    沒有金鑰？可至 Google AI Studio 免費申請。
                </p>
            </div>
        </div>
    </div>

<script>
    // --- 應用程式狀態 ---
    let state = {
        gameState: 'start', // 'start', 'playing', 'result'
        currentStep: 1,     // 1 to 6 for questions, 7 for result
        score: 0,
        selectedOption: null, // 'A', 'B', 'C'
        isAnswerChecked: false,
        feedbackType: null, // null, 'correct', 'incorrect'
        feedbackMsg: ''
    };

    // AI Tutor 狀態
    let aiExplanation = null;
    let aiLoading = false;
    let isSpeaking = false;
    let currentUtterance = null;

    // AI 懸賞單狀態
    let aiNewCaseLoading = false;
    let aiNewCaseData = null;
    let aiNewCaseFeedback = null;
    let aiNewCaseMsg = '';
    let aiNewCaseSelected = null;

    // --- 關卡與題目資料庫 (共6題) ---
    const tasksMetadata = {
        1: {
            title: "案件一：散落的零錢",
            scenario: "桌上有 60 元硬幣 (60個一元)，如果要平分給 7 個人...",
            icon: "💰",
            math: "60 ÷ 7 = ?",
            options: [
                { id: 'A', text: "A. 8 元，剩下 40 元" },
                { id: 'B', text: "B. 8 元，剩下 4 元" },
                { id: 'C', text: "C. 80 元，剩下 4 元" }
            ],
            correctAnswer: 'B',
            hint: "想一下九九乘法表，7 × 8 = 56，用 60 減去 56，剩下來的硬幣就是餘數囉！",
            explanation: "60 ÷ 7 = 8 ... 4。這是最基本的計算！每人拿 8 元，剩下 4 元。"
        },
        2: {
            title: "案件二：銀行大換鈔",
            scenario: "現在金額變大了！有 6000 元要分給 700 人。<br><span class='text-xs text-slate-500'>(我們把錢換成『百元鈔』算算看：6000元是60張百元鈔，700人是7隊，60張 ÷ 7隊 = 8 ... 4)</span>",
            icon: "🏦",
            math: "60張 ÷ 7隊 = 8 ... 4",
            options: [
                { id: 'A', text: "A. 剩下 4 元 (4個一)" },
                { id: 'B', text: "B. 剩下 40 元 (4個十)" },
                { id: 'C', text: "C. 剩下 400 元 (4張一百)" }
            ],
            correctAnswer: 'C',
            hint: "關鍵在於單位！我們把 6000 元看作 60張「百元鈔」去分配，剩下的 4 代表剩下 4張什麼鈔票呢？",
            explanation: "因為我們是用「百元鈔」在分，剩下 4 張百元鈔，價值就是 400 元！"
        },
        3: {
            title: "案件三：規律的秘密",
            scenario: "林老師在黑板上寫了三個算式，請你觀察：<br>① 600000 ÷ 700<br>② 60000 ÷ 70<br>③ 6000 ÷ 7",
            icon: "🔥",
            math: "商與餘數的規律？",
            options: [
                { id: 'A', text: "A. 商相同，餘數也全部相同" },
                { id: 'B', text: "B. 商相同，但餘數不同" },
                { id: 'C', text: "C. 被除數越大，商就越大" }
            ],
            correctAnswer: 'B',
            hint: "回想剛剛的『百元鈔』案例！①剩下 4張千元鈔，②剩下 4張百元鈔，③剩下 4張十元鈔。雖然劃掉零以後『算出來的餘數』都是 4，但代表的實際錢數一樣嗎？",
            explanation: "雖然計算時我們會劃掉 0 讓商 (答案) 好算，且商均相同。但餘數的實際位值與單位不同，所以餘數其實不同！"
        },
        4: {
            title: "案件四：神秘的餘數",
            scenario: "計算 430 ÷ 60 時，我們可以先同時劃掉一個 0 來簡化計算...",
            icon: "✏️",
            math: "43 ÷ 6 = 7 ... 1",
            options: [
                { id: 'A', text: "A. 1" },
                { id: 'B', text: "B. 10" },
                { id: 'C', text: "C. 100" }
            ],
            correctAnswer: 'B',
            hint: "我們剛剛為了好算，把 430 看成 43 個十 (除以 10)，所以餘數算出來是 1 個十。真正答案要還原回去喔！",
            explanation: "我們劃掉了 1 個 0 (代表除以 10)，所以餘下的 1 其實是 1 個十，必須還原為 10。"
        },
        5: {
            title: "案件五：消失的零",
            scenario: "計算 2600 ÷ 800 時，我們把被除數和除數的兩個 0 都劃掉來計算...",
            icon: "✏️",
            math: "26 ÷ 8 = 3 ... 2",
            options: [
                { id: 'A', text: "A. 2" },
                { id: 'B', text: "B. 20" },
                { id: 'C', text: "C. 200" }
            ],
            correctAnswer: 'C',
            hint: "劃掉兩個 0 代表同時縮小了 100 倍！所以餘下的 2 代表的是 2張百元鈔，真正的餘數需要乘回多少呢？",
            explanation: "劃掉 2 個 0 (縮小 100 倍)，所以算出來的餘數 2 要補回 2 個 0 (放大 100 倍)，真正的餘數是 200。"
        },
        6: {
            title: "案件六：繩子謎團",
            scenario: "有一條長 700 公分的繩子，每 300 公分剪成一段。我們把被除數和除數同時劃掉兩個 0 來計算...",
            icon: "🧶",
            math: "7 ÷ 3 = 2 ... 1",
            options: [
                { id: 'A', text: "A. 剩下 1 公分" },
                { id: 'B', text: "B. 剩下 10 公分" },
                { id: 'C', text: "C. 剩下 100 公分" }
            ],
            correctAnswer: 'C',
            hint: "這條繩子原本有 700 公分，剪掉了 2 段 300 公分 (共 600 公分)，你想想看應該剩下多少公分呢？",
            explanation: "700 - 300 × 2 = 100 公分。簡化計算中劃掉 2 個 0，餘數 1 就要乘回 100，答案是 100 公分。"
        }
    };

    // --- API Key 管理 ---
    function getApiKey() {
        return localStorage.getItem('gemini_api_key') || '';
    }

    function toggleSettingsModal() {
        const modal = document.getElementById('settings-modal');
        const input = document.getElementById('api-key-input');
        input.value = getApiKey();
        modal.classList.toggle('hidden');
    }

    function saveApiKey() {
        const input = document.getElementById('api-key-input');
        const key = input.value.trim();
        if (key) {
            localStorage.setItem('gemini_api_key', key);
            alert('API Key 儲存成功！');
        } else {
            localStorage.removeItem('gemini_api_key');
            alert('已清除 API Key。');
        }
        toggleSettingsModal();
        render();
    }

    function clearApiKey() {
        localStorage.removeItem('gemini_api_key');
        const input = document.getElementById('api-key-input');
        input.value = '';
        alert('已清除 API Key。');
        toggleSettingsModal();
        render();
    }

    // --- AI Tutor API 呼叫 ---
    async function callGeminiAPI(prompt, apiKey, retries = 3, delay = 1000) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const payload = { contents: [{ parts: [{ text: prompt }] }] };

        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error(`API call failed: ${response.status}`);
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，AI 老師現在有點忙，請稍後再試。";
            } catch (error) {
                if (i === retries - 1) throw error;
                await new Promise(resolve => setTimeout(resolve, delay * Math.pow(2, i)));
            }
        }
    }

    async function handleAskAI() {
        const key = getApiKey();
        if (!key) {
            alert('請點選右上角齒輪設定 Gemini API Key，即可呼叫總部探長求救！');
            toggleSettingsModal();
            return;
        }

        aiLoading = true;
        aiExplanation = null;
        render();

        const step = state.currentStep;
        const meta = tasksMetadata[step];
        
        const prompt = `
            你是一個國小四年級數學家教，扮演「偵探總部探長」。
            學生現在卡在一個數學問題上，情境是：${meta.scenario}。
            題目概念關於：除法被除數與除數同時縮小（劃掉 0）計算時，商不變，但餘數會改變（需要補回對應倍數的 0 也就是乘回去）。
            
            請給學生一個簡短、幽默且引導性的提示。
            規則：
            1. **絕對不要**直接給出選項 A、B、C 或數字答案。
            2. 使用「錢幣」、「分堆」、「袋子」或「單位」的比喻。
            3. 字數在 80 字以內，語氣要像偵探對夥伴說話。
            4. 使用繁體中文回答。
        `;

        try {
            const result = await callGeminiAPI(prompt, key);
            aiExplanation = result;
        } catch (error) {
            aiExplanation = "報告探員！總部通訊受到強大磁場干擾，請檢查金鑰設定。";
        } finally {
            aiLoading = false;
            render();
        }
    }

    function handleSpeak() {
        if (isSpeaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
            render();
        } else {
            if (!aiExplanation) return;
            const cleanText = aiExplanation.replace(/[\*#_`~]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'zh-TW';
            utterance.rate = 0.95;
            utterance.onend = () => {
                isSpeaking = false;
                render();
            };
            utterance.onerror = () => {
                isSpeaking = false;
                render();
            };
            window.speechSynthesis.speak(utterance);
            isSpeaking = true;
            currentUtterance = utterance;
            render();
        }
    }

    // --- AI 隨機懸賞單產生 ---
    async function generateNewCase() {
        const key = getApiKey();
        if (!key) {
            alert('請點選右上角齒輪設定 Gemini API Key，即可體驗 AI 隨機懸賞單功能！');
            toggleSettingsModal();
            return;
        }

        aiNewCaseLoading = true;
        aiNewCaseData = null;
        aiNewCaseFeedback = null;
        aiNewCaseMsg = '';
        aiNewCaseSelected = null;
        render();

        const prompt = `
            請生成一個國小四年級數學題目，關於「被除數和除數同時縮小計算（商不變餘數改變）」的概念。
            
            請直接回傳 JSON 格式，不要有 markdown 標記（如 \`\`\`json 等）。JSON 格式如下：
            {
                "title": "案件標題",
                "story": "簡短的情境故事（例如分糖果、繩子、錢幣）",
                "math": "算式（例如 500 ÷ 40）",
                "question": "問題（例如：真正的餘數是多少？）",
                "options": [
                    {"id": "A", "text": "選項A", "correct": false, "feedback": "錯誤回饋（說明原因）"},
                    {"id": "B", "text": "選項B", "correct": true, "feedback": "正確回饋（說明原因）"},
                    {"id": "C", "text": "選項C", "correct": false, "feedback": "錯誤回饋（說明原因）"}
                ]
            }
            請確保正確選項 correct 為 true，其他為 false。選項內容需符合常理，請用繁體中文。
        `;

        try {
            let text = await callGeminiAPI(prompt, key);
            text = text.replace(/```json/g, '').replace(/```/g, '').trim();
            const data = JSON.parse(text);
            aiNewCaseData = data;
        } catch (e) {
            console.error(e);
            aiNewCaseMsg = "總部密碼鎖解開失敗，請再次嘗試生成。";
        } finally {
            aiNewCaseLoading = false;
            render();
        }
    }

    function checkAIAnswer(optionId) {
        if (!aiNewCaseData || aiNewCaseFeedback === 'correct') return;
        
        aiNewCaseSelected = optionId;
        const opt = aiNewCaseData.options.find(o => o.id === optionId);
        
        if (opt.correct) {
            aiNewCaseFeedback = 'correct';
            aiNewCaseMsg = `🎉 答對了！ ${opt.feedback}`;
            
            confetti({
                particleCount: 80,
                spread: 60,
                origin: { y: 0.8 },
                colors: ['#A29BFE', '#818CF8', '#34D399', '#FBBF24']
            });
        } else {
            aiNewCaseFeedback = 'incorrect';
            aiNewCaseMsg = `❌ 再想一下... ${opt.feedback}`;
        }
        render();
    }

    // --- 動作函數 ---
    function goStartScreen() {
        state.gameState = 'start';
        state.currentStep = 1;
        state.score = 0;
        state.selectedOption = null;
        state.isAnswerChecked = false;
        state.feedbackType = null;
        state.feedbackMsg = '';

        aiExplanation = null;
        aiLoading = false;
        isSpeaking = false;
        window.speechSynthesis.cancel();
        
        aiNewCaseData = null;
        aiNewCaseFeedback = null;
        aiNewCaseMsg = '';
        aiNewCaseSelected = null;

        render();
    }

    function startChallenge() {
        state.gameState = 'playing';
        state.currentStep = 1;
        state.score = 0;
        state.selectedOption = null;
        state.isAnswerChecked = false;
        state.feedbackType = null;
        state.feedbackMsg = '';

        aiExplanation = null;
        aiLoading = false;
        isSpeaking = false;
        window.speechSynthesis.cancel();

        render();
    }

    function selectOption(optionId) {
        if (state.isAnswerChecked) return;
        state.selectedOption = optionId;
        render();
    }

    function checkAnswer() {
        if (state.isAnswerChecked || !state.selectedOption) return;

        const step = state.currentStep;
        const meta = tasksMetadata[step];
        const isCorrect = (state.selectedOption === meta.correctAnswer);

        state.isAnswerChecked = true;

        if (isCorrect) {
            state.score += 15;
            if (state.score > 90) state.score = 90; // 6 題共 90 分，最後滿分 90 或總結
            state.feedbackType = 'correct';
            state.feedbackMsg = meta.explanation;

            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#FF6B6B', '#4ECDC4', '#FFE66D', '#A29BFE']
            });
        } else {
            state.feedbackType = 'incorrect';
            state.feedbackMsg = meta.hint;
        }
        render();
    }

    function nextStep() {
        aiExplanation = null;
        aiLoading = false;
        isSpeaking = false;
        window.speechSynthesis.cancel();

        if (state.currentStep < 6) {
            state.currentStep++;
            state.selectedOption = null;
            state.isAnswerChecked = false;
            state.feedbackType = null;
            state.feedbackMsg = '';
            render();
        } else {
            state.gameState = 'result';
            state.score = 100; // 通關 100 分
            render();
        }
    }

    function prevStep() {
        aiExplanation = null;
        aiLoading = false;
        isSpeaking = false;
        window.speechSynthesis.cancel();

        if (state.currentStep > 1) {
            state.currentStep--;
            state.selectedOption = null;
            state.isAnswerChecked = false;
            state.feedbackType = null;
            state.feedbackMsg = '';
            render();
        } else {
            state.gameState = 'start';
            render();
        }
    }

    // --- 畫面渲染函數 ---
    function render() {
        const app = document.getElementById('app');

        if (state.gameState === 'start') {
            app.innerHTML = `
                <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden relative fade-in border-b-8 border-cyan-400">
                    <!-- 設定按鈕 -->
                    <button onclick="toggleSettingsModal()" class="absolute top-4 right-4 bg-white p-3 rounded-full text-slate-500 hover:text-slate-700 shadow-sm border border-slate-100 transition hover:rotate-45 duration-300 z-50 animate-pulse" title="API 設定">
                        <i class="fa-solid fa-gear text-xl"></i>
                    </button>

                    <div class="bg-gradient-to-tr from-cyan-400 via-sky-400 to-indigo-400 p-8 text-center relative overflow-hidden text-white">
                        <div class="absolute -top-6 -left-6 w-16 h-16 bg-white/20 rounded-full"></div>
                        <div class="absolute -bottom-6 -right-6 w-24 h-24 bg-white/20 rounded-full"></div>
                        
                        <div class="mb-4 flex justify-center">
                             <div class="bg-white/90 w-20 h-20 rounded-full flex items-center justify-center shadow-md text-cyan-600 text-4xl animate-bounce">
                                <i class="fa-solid fa-calculator"></i>
                             </div>
                        </div>
                        <h1 class="text-3xl font-black mb-1 tracking-wider">數學偵探社</h1>
                        <p class="text-sky-100 font-medium">餘數變身之謎 ‧ 闖關大挑戰</p>
                    </div>

                    <div class="p-8">
                        <p class="text-slate-600 text-center font-bold text-lg mb-6 leading-relaxed">
                            歡迎加入偵探行動！<br>除法簡化時「劃掉 0」有什麼魔法？商和餘數到底有什麼秘密？讓我們一起破案吧！
                        </p>
                        
                        <div class="bg-sky-50/80 p-4 rounded-2xl border border-sky-100 text-left space-y-3 mb-8 text-sm">
                            <h4 class="font-black text-sky-950 text-center border-b border-sky-200 pb-2 mb-2 text-base">
                                💡 案件偵查守則
                            </h4>
                            <p class="text-slate-700 font-semibold leading-relaxed">
                                1. 除法簡化時，被除數與除數可以同時劃掉相同個數的 0 (同除以 10 或 100)。<br>
                                2. 簡化後算出來的<strong>商不會變</strong>，但<strong>餘數會跟著縮小</strong>！<br>
                                3. <strong>真正的餘數</strong>必須要乘回縮小的倍數喔！
                            </p>
                        </div>

                        <button onclick="startChallenge()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-600 hover:to-blue-600 text-white text-xl font-bold py-4 rounded-2xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-shield-halved"></i> 開始偵查案件
                        </button>
                    </div>

                    <!-- 設計者頁尾 -->
                    <footer class="mt-2 mb-6 text-center text-xs text-slate-400">
                        設計者：國立屏科實驗高級中等學校(國小部) 林敬修老師
                    </footer>
                </div>
            `;
        }

        else if (state.gameState === 'playing') {
            const step = state.currentStep;
            const progress = (step / 6) * 100;
            const meta = tasksMetadata[step];
            const selected = state.selectedOption;

            // 生成進度點 HTML
            let stepsHTML = '';
            for (let i = 1; i <= 6; i++) {
                let stepClass = "width: 30px; height: 30px; rounded-full border-2 flex items-center justify-center font-bold text-xs transition z-10 ";
                if (i === step) {
                    stepClass += "border-cyan-500 bg-white text-cyan-600 scale-110 ";
                } else if (i < step) {
                    stepClass += "border-teal-500 bg-teal-500 text-white ";
                } else {
                    stepClass += "border-slate-200 bg-white text-slate-300 ";
                }
                stepsHTML += `<div class="${stepClass}">${i < step ? '✓' : i}</div>`;
            }

            // 選項按鈕 HTML
            let optionsHTML = '';
            meta.options.forEach(opt => {
                let btnClass = "py-3 px-4 rounded-2xl font-bold text-left text-base border-2 w-full transition-all ";
                if (state.isAnswerChecked) {
                    if (opt.id === meta.correctAnswer) {
                        btnClass += "bg-green-50 border-green-500 text-green-700 shadow-sm";
                    } else if (selected === opt.id) {
                        btnClass += "bg-red-50 border-red-500 text-red-700 shadow-inner";
                    } else {
                        btnClass += "bg-slate-50 border-slate-100 text-slate-300 cursor-not-allowed";
                    }
                } else {
                    if (selected === opt.id) {
                        btnClass += "bg-cyan-50 border-cyan-500 text-cyan-700 shadow-inner";
                    } else {
                        btnClass += "bg-white border-slate-200 text-slate-600 hover:border-cyan-300 hover:bg-cyan-50/50 shadow-sm";
                    }
                }
                optionsHTML += `
                    <button onclick="selectOption('${opt.id}')" ${state.isAnswerChecked ? 'disabled' : ''} class="${btnClass}">
                        ${opt.text}
                    </button>
                `;
            });

            // 反饋回饋區 HTML
            let feedbackHTML = '';
            if (state.isAnswerChecked) {
                if (state.feedbackType === 'correct') {
                    feedbackHTML = `
                        <div class="bg-green-50 border border-green-200 rounded-2xl p-4 mb-4 text-left animate-fade-in">
                            <div class="flex items-center gap-2 text-green-700 font-bold mb-1">
                                <i class="fa-solid fa-circle-check text-xl"></i> <span>破案成功！</span>
                            </div>
                            <p class="text-green-800 text-sm font-medium leading-relaxed">${state.feedbackMsg}</p>
                        </div>
                        <button onclick="nextStep()" class="w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-3.5 rounded-xl shadow-md flex items-center justify-center gap-2 transition active:scale-95">
                            <span>${step < 6 ? "前往下一案" : "觀看偵查報告"}</span>
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    `;
                } else {
                    feedbackHTML = `
                        <div class="bg-red-50 border border-red-200 rounded-2xl p-4 mb-4 text-left animate-fade-in">
                            <div class="flex items-center gap-2 text-red-700 font-bold mb-1">
                                <i class="fa-solid fa-circle-xmark"></i> <span>踩到推理陷阱...</span>
                            </div>
                            <p class="text-red-800 text-sm font-semibold leading-relaxed">${state.feedbackMsg}</p>
                        </div>
                        <button onclick="goStartScreen()" class="w-full bg-slate-500 hover:bg-slate-600 text-white font-bold py-3.5 rounded-xl shadow-md transition active:scale-95">
                            重整旗鼓，回首頁重新開始
                        </button>
                    `;
                }
            } else {
                const btnClass = selected ? 'bg-cyan-600 text-white hover:bg-cyan-700 transform active:scale-95' : 'bg-slate-200 text-slate-400 cursor-not-allowed';
                feedbackHTML = `<button onclick="checkAnswer()" ${!selected ? 'disabled' : ''} class="w-full py-3.5 rounded-xl font-bold text-lg shadow-md transition-all ${btnClass}">送出答案報告</button>`;
            }

            // AI 助教區 HTML
            let aiTutorHTML = '';
            if (!aiExplanation && !aiLoading) {
                aiTutorHTML = `
                    <button onclick="handleAskAI()" class="w-full bg-gradient-to-r from-indigo-400 to-purple-400 text-white font-bold py-3 px-6 rounded-2xl shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 text-sm">
                      <i class="fa-solid fa-wand-magic-sparkles animate-pulse"></i>
                      <span>✨ 呼叫總部求救 (AI 提示)</span>
                    </button>
                `;
            } else if (aiLoading) {
                aiTutorHTML = `
                    <div class="w-full bg-white p-4 rounded-2xl shadow-sm border border-indigo-100 flex items-center justify-center space-x-3 animate-pulse">
                      <div class="w-3 h-3 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                      <div class="w-3 h-3 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                      <div class="w-3 h-3 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                      <span class="text-indigo-500 font-medium text-xs">總部探長正在分析餘數...</span>
                    </div>
                `;
            } else if (aiExplanation) {
                aiTutorHTML = `
                    <div class="w-full bg-white p-5 rounded-2xl shadow-md border-l-4 border-indigo-400 animate-fade-in relative text-left">
                      <div class="flex justify-between items-start mb-1.5">
                         <h4 class="font-bold text-indigo-600 flex items-center gap-1.5 text-sm">
                           <i class="fa-solid fa-wand-magic-sparkles"></i> 總部探長的回覆
                         </h4>
                         <button onclick="handleSpeak()" class="text-slate-400 hover:text-indigo-500 transition-colors" title="朗讀線索">
                           ${isSpeaking ? '<i class="fa-solid fa-circle-stop text-2xl text-red-500"></i>' : '<i class="fa-solid fa-volume-high text-xl"></i>'}
                         </button>
                      </div>
                      <p class="text-slate-600 leading-relaxed whitespace-pre-wrap text-sm font-semibold">
                        ${aiExplanation}
                      </p>
                    </div>
                `;
            }

            app.innerHTML = `
                <!-- 頂部資訊與進度條 -->
                <div class="w-full max-w-4xl flex justify-between items-center mb-6 px-2">
                    <button onclick="prevStep()" class="text-slate-500 hover:text-slate-700 flex items-center gap-2 font-bold transition">
                        <i class="fa-solid fa-arrow-left"></i> 回上頁
                    </button>
                    <!-- 精美進度圓點條 -->
                    <div class="flex-1 mx-6 flex justify-between items-center relative">
                        <div class="absolute left-0 right-0 h-1 bg-slate-200 z-0"></div>
                        <div class="absolute left-0 h-1 bg-teal-400 z-0 transition-all duration-500" style="width: ${progress - 16.6}%"></div>
                        ${stepsHTML}
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="text-cyan-900 font-bold text-lg bg-white px-3 py-1 rounded-lg shadow-sm border border-slate-100">
                            ${state.score} 分
                        </div>
                        <button onclick="toggleSettingsModal()" class="bg-white p-2.5 rounded-xl text-slate-400 hover:text-slate-600 border border-slate-100 transition shadow-sm" title="API 設定">
                           <i class="fa-solid fa-gear"></i>
                        </button>
                    </div>
                </div>

                <!-- 雙欄排版卡片 -->
                <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
                    <!-- 左欄：情境故事與算式 -->
                    <div class="md:col-span-8 space-y-4">
                        <div class="bg-white rounded-3xl shadow-lg border-b-8 border-cyan-200 overflow-hidden">
                            <div class="bg-cyan-500 p-4 border-b border-cyan-100 flex justify-between items-center text-white">
                                <span class="bg-white text-cyan-700 text-xs px-2.5 py-1 rounded-md font-bold tracking-wider">案件 ${step} / 6</span>
                                <span class="font-black text-sm md:text-base">${meta.title}</span>
                            </div>
                            <div class="p-6 text-center">
                                <div class="scenario-box">
                                    <span class="icon-bounce text-3xl mb-1">${meta.icon}</span><br>
                                    <p class="text-slate-700 font-bold text-base md:text-lg leading-relaxed">${meta.scenario}</p>
                                </div>
                                
                                <p class="text-slate-500 text-sm font-semibold mb-2">請問：以下算式的真正答案是？</p>
                                <div class="math-display font-mono font-black text-2xl text-slate-800">${meta.math}</div>
                            </div>
                        </div>

                        <!-- AI 助教 -->
                        <div class="w-full">
                            ${aiTutorHTML}
                        </div>
                    </div>

                    <!-- 右欄：選項與作答區 -->
                    <div class="md:col-span-4 w-full space-y-6">
                        <div class="bg-white rounded-3xl p-6 shadow-lg border-b-8 border-cyan-200 flex flex-col justify-center min-h-[300px]">
                           <h3 class="text-xl font-bold text-slate-700 mb-6 text-center">請指認正確說法</h3>
                           <div class="grid grid-cols-1 gap-3 w-full mb-4">
                                ${optionsHTML}
                           </div>
                           <div class="w-full">
                                ${feedbackHTML}
                           </div>
                        </div>
                    </div>
                </div>

                <!-- 設計者頁尾 -->
                <footer class="mt-12 text-center text-xs text-slate-400">
                    設計者：國立屏科實驗高級中等學校(國小部) 林敬修老師
                </footer>
            `;
        }

        else if (state.gameState === 'result') {
            // 生成隨機懸賞單 HTML
            let aiCaseHTML = '';
            if (aiNewCaseLoading) {
                aiCaseHTML = `
                    <div class="w-full bg-white p-8 rounded-2xl shadow-inner border border-purple-100 flex flex-col items-center justify-center space-y-3 animate-pulse mt-4">
                      <div class="w-12 h-12 rounded-full border-4 border-purple-200 border-t-purple-500 animate-spin"></div>
                      <span class="text-purple-600 font-black text-sm">總部探長正在設計全新懸賞單...</span>
                    </div>
                `;
            } else if (aiNewCaseData) {
                let optionsHTML = aiNewCaseData.options.map(opt => {
                    let btnClass = "py-3.5 px-4 rounded-xl font-bold text-left text-sm md:text-base border-2 w-full transition-all ";
                    if (aiNewCaseFeedback === 'correct') {
                        if (opt.correct) btnClass += "bg-green-50 border-green-500 text-green-700 shadow-sm ";
                        else btnClass += "bg-slate-50 border-slate-100 text-slate-300 cursor-not-allowed ";
                    } else if (aiNewCaseFeedback === 'incorrect') {
                        if (aiNewCaseSelected === opt.id) btnClass += "bg-red-100 border-red-500 text-red-700 shadow-inner ";
                        else btnClass += "bg-white border-slate-200 text-slate-600 hover:border-purple-300 hover:bg-purple-50/20 ";
                    } else {
                        if (aiNewCaseSelected === opt.id) btnClass += "bg-purple-100 border-purple-500 text-purple-700 shadow-inner ";
                        else btnClass += "bg-white border-slate-200 text-slate-600 hover:border-purple-300 hover:bg-purple-50/20 shadow-sm ";
                    }
                    return `
                        <button onclick="checkAIAnswer('${opt.id}')" ${aiNewCaseFeedback === 'correct' ? 'disabled' : ''} class="${btnClass}">
                            ${opt.id}. ${opt.text}
                        </button>
                    `;
                }).join('');

                let feedbackArea = '';
                if (aiNewCaseFeedback) {
                    const fbColor = aiNewCaseFeedback === 'correct' ? 'bg-green-50 text-green-800 border-green-200' : 'bg-red-50 text-red-800 border-red-200';
                    feedbackArea = `
                        <div class="p-4 rounded-2xl border ${fbColor} font-bold text-sm leading-relaxed animate-fade-in mt-4">
                            ${aiNewCaseMsg}
                        </div>
                    `;
                }

                aiCaseHTML = `
                    <div class="w-full bg-slate-50 rounded-3xl p-6 border-2 border-purple-400 shadow-lg text-left fade-in mt-6 relative">
                        <span class="absolute -top-3.5 left-6 bg-purple-500 text-white font-black text-xs px-3 py-1 rounded-full shadow-sm">
                            <i class="fa-solid fa-wand-magic-sparkles mr-1 animate-pulse"></i> AI 隨機生成案件
                        </span>
                        <h3 class="text-xl font-black text-purple-800 mt-2 mb-3">${aiNewCaseData.title}</h3>
                        <div class="bg-purple-50/50 p-4 rounded-2xl border border-purple-100 text-slate-700 font-bold text-sm md:text-base leading-relaxed mb-4">
                            ${aiNewCaseData.story}
                        </div>
                        <div class="text-center font-mono font-black text-2xl text-slate-800 bg-white p-3 rounded-xl border border-slate-200 mb-4">${aiNewCaseData.math}</div>
                        <p class="text-slate-600 font-bold mb-4 text-sm">${aiNewCaseData.question}</p>
                        
                        <div class="grid grid-cols-1 gap-3 w-full">
                            ${optionsHTML}
                        </div>
                        ${feedbackArea}
                    </div>
                `;
            } else if (aiNewCaseMsg) {
                aiCaseHTML = `
                    <div class="p-4 rounded-2xl bg-red-50 text-red-700 border border-red-100 text-center font-bold text-sm mt-4">
                        ${aiNewCaseMsg}
                    </div>
                `;
            }

            app.innerHTML = `
                <div class="max-w-xl w-full bg-white rounded-3xl shadow-xl overflow-hidden text-center fade-in border-b-8 border-emerald-400">
                    <div class="bg-gradient-to-tr from-emerald-400 to-teal-500 p-8 text-white relative">
                        <div class="text-6xl mb-3">🏆</div>
                        <h2 class="text-3xl font-black mb-2">恭喜全數破案！</h2>
                        <p class="text-emerald-100 font-medium">你已成功掌握「商不變，餘數還原」的秘密</p>
                    </div>

                    <div class="p-6">
                        <!-- 總結表格 -->
                        <h3 class="text-lg font-bold text-slate-700 mb-3 text-left flex items-center gap-1.5 border-b pb-2">
                            <i class="fa-solid fa-rectangle-list text-emerald-500"></i>
                            <span>偵查報告摘要表</span>
                        </h3>
                        <div class="overflow-x-auto bg-slate-50 p-1.5 rounded-2xl mb-6">
                            <table class="summary-table w-full border-collapse bg-white rounded-xl overflow-hidden text-xs md:text-sm font-bold text-slate-600">
                                <thead>
                                    <tr class="bg-emerald-500 text-white text-center">
                                        <th class="p-2 border border-emerald-400">算式</th>
                                        <th class="p-2 border border-emerald-400">計算想法 (劃掉0)</th>
                                        <th class="p-2 border border-emerald-400">商</th>
                                        <th class="p-2 border border-emerald-400">餘數 (還原)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr class="border-b">
                                        <td class="p-2 border">60 ÷ 7</td>
                                        <td class="p-2 border text-slate-400">直接除 (不劃)</td>
                                        <td class="p-2 border font-mono">8</td>
                                        <td class="p-2 border font-mono text-emerald-600">4</td>
                                    </tr>
                                    <tr class="border-b bg-emerald-50/10">
                                        <td class="p-2 border">430 ÷ 60</td>
                                        <td class="p-2 border">劃掉 1 個 0 (÷ 10)</td>
                                        <td class="p-2 border font-mono">7</td>
                                        <td class="p-2 border font-mono text-emerald-600">1 ➔ <strong>10</strong></td>
                                    </tr>
                                    <tr class="border-b">
                                        <td class="p-2 border">2600 ÷ 800</td>
                                        <td class="p-2 border">劃掉 2 個 0 (÷ 100)</td>
                                        <td class="p-2 border font-mono">3</td>
                                        <td class="p-2 border font-mono text-emerald-600">2 ➔ <strong>200</strong></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- 偵探筆記 -->
                        <div class="bg-emerald-50 border border-emerald-100 p-4 rounded-2xl text-left text-sm font-bold text-slate-700 leading-relaxed mb-6">
                            📌 <strong>重要偵探筆記：</strong><br>
                            劃除幾個 0 來計算，商不變；但<strong>餘數要補回相同個數的 0</strong>！<br>
                            （例如：劃掉兩個 0 計算，算出餘數是 2，真正餘數是 2 乘回 100 得到 200！）
                        </div>

                        <!-- AI 懸賞挑戰 -->
                        <div class="border-t border-dashed border-slate-200 pt-6">
                            <h3 class="text-lg font-black text-purple-600 flex items-center gap-1.5 justify-center mb-1.5">
                                 <i class="fa-solid fa-wand-magic-sparkles animate-pulse"></i> 挑戰無極限
                            </h3>
                            <p class="text-slate-500 text-xs font-semibold mb-4 leading-relaxed">
                                覺得已經完全學會了嗎？點擊按鈕，讓 AI 偵探總部即時生成全新隨機案件考考你！
                            </p>
                            <button onclick="generateNewCase()" class="bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-600 hover:to-indigo-600 text-white font-bold py-3.5 px-6 rounded-2xl shadow-md hover:shadow-lg transition active:scale-95 text-sm">
                                <i class="fa-solid fa-scroll"></i> 生成隨機懸賞單 (AI)
                            </button>
                            
                            ${aiCaseHTML}
                        </div>

                        <div class="mt-8 pt-6 border-t border-slate-100 flex gap-4">
                            <button onclick="goStartScreen()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition active:scale-95 text-sm">
                                <i class="fa-solid fa-rotate-left"></i> 重新破案
                            </button>
                            <button onclick="toggleSettingsModal()" class="bg-slate-100 hover:bg-slate-200 text-slate-500 p-3 rounded-xl transition border border-slate-200" title="API 設定">
                                <i class="fa-solid fa-gear text-lg"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 設計者頁尾 -->
                    <footer class="mt-2 mb-6 text-center text-xs text-slate-400">
                        設計者：國立屏科實驗高級中等學校(國小部) 林敬修老師
                    </footer>
                </div>
            `;
        }
    }

    // 初始渲染
    render();
</script>

</body>
</html>
