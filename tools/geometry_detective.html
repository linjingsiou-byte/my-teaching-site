// --- 應用程式狀態 ---
let state = {
    stage: 'start', // 'start', 'tips', 'playing', 'result'
    currentQIndex: 0,
    score: 0,
    selectedOption: null,
    isAnswerChecked: false,
    showExplanation: false,
    feedbackType: null
};

// AI 助教狀態
let aiExplanation = null;
let aiLoading = false;
let isSpeaking = false;
let currentUtterance = null;

// --- API Key 管理 ---
function getApiKey() {
    return localStorage.getItem('gemini_api_key') || '';
}

function toggleSettingsModal() {
    const modal = document.getElementById('settings-modal');
    const input = document.getElementById('api-key-input');
    input.value = getApiKey();
    modal.classList.toggle('hidden');
}

function saveApiKey() {
    const input = document.getElementById('api-key-input');
    const key = input.value.trim();
    if (key) {
        localStorage.setItem('gemini_api_key', key);
        alert('API Key 儲存成功！');
    } else {
        localStorage.removeItem('gemini_api_key');
        alert('已清除 API Key。');
    }
    toggleSettingsModal();
    render();
}

function clearApiKey() {
    localStorage.removeItem('gemini_api_key');
    const input = document.getElementById('api-key-input');
    input.value = '';
    alert('已清除 API Key。');
    toggleSettingsModal();
    render();
}

// --- AI Tutor API 呼叫 ---
async function callGeminiAPI(prompt, apiKey, retries = 3, delay = 1000) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
    const payload = { contents: [{ parts: [{ text: prompt }] }] };

    for (let i = 0; i < retries; i++) {
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error(`API call failed: ${response.status}`);
            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，AI 老師現在有點忙，請稍後再試。";
        } catch (error) {
            if (i === retries - 1) throw error;
            await new Promise(resolve => setTimeout(resolve, delay * Math.pow(2, i)));
        }
    }
}

async function handleAskAI() {
    const key = getApiKey();
    if (!key) {
        alert('請先點選右上角齒輪設定 Gemini API Key，即可使用偵探學長助解題！');
        toggleSettingsModal();
        return;
    }

    aiLoading = true;
    aiExplanation = null;
    render();

    const q = questions[state.currentQIndex];
    const prompt = `你現在是一位超級會教數學的國小老師，也是「圖形偵探隊」的偵探學長。請根據以下資訊，引導新進偵探隊員解密圖形的周長與面積：
    【任務資訊】
    - 任務類型：${q.category} 挑戰 (周長或面積)
    - 題目敘述：${q.question}
    - 解密提示：${q.hint}
    - 完整詳解說明：${q.explanation}

    【您的任務】
    1. 請使用國小四年級（9-10歲）聽得懂的簡單詞彙，語氣要活潑、自信、富有「探案解謎」的樂趣，多使用「偵探隊員你好！」、「讓我們拿出放大鏡觀察這個圖形」等偵探口吻。
    2. 請「不要」直接透露計算結果或最終答案（例如不要直接說出 36 公分或 71 平方公分）。
    3. 您的引導重點是分析圖形特徵：
       - 如果是「周長」，引導他們觀察是否能用「平移法」把凹線向外推，補成完整的長方形？推完後有沒有多出多餘的線段要加回去？
       - 如果是「面積」，引導他們思考是用「切割法」切成多個長方形算完相加，還是用「填補法」拿大長方形減去被挖空的空白長方形？
    4. 輸出排版請包含適當的換行與 emoji。
    5. 最後給予隊員溫暖且激勵的探案肯定。
    請使用繁體中文回答。`;

    try {
        const result = await callGeminiAPI(prompt, key);
        aiExplanation = result;
    } catch (error) {
        aiExplanation = "報告隊長！通訊系統遭受干擾，請檢查金鑰設定或稍後再試。";
    } finally {
        aiLoading = false;
        render();
    }
}

function handleSpeak() {
    if (isSpeaking) {
        window.speechSynthesis.cancel();
        isSpeaking = false;
        render();
    } else {
        if (!aiExplanation) return;
        const cleanText = aiExplanation.replace(/[\*#_`~]/g, '');
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.95;
        utterance.onend = () => {
            isSpeaking = false;
            render();
        };
        utterance.onerror = () => {
            isSpeaking = false;
            render();
        };
        window.speechSynthesis.speak(utterance);
        isSpeaking = true;
        currentUtterance = utterance;
        render();
    }
}

                <text x="10" y="60" text-anchor="middle" fill="${textColor}" font-size="14" font-weight="bold">16</text>
                <text x="115" y="55" text-anchor="middle" fill="#B91C1C" font-size="12" font-weight="bold">10</text>
                <text x="80" y="90" text-anchor="middle" fill="#B91C1C" font-size="12" font-weight="bold">10</text>
            </svg>`;
        case "T-shape":
            return `<svg viewBox="0 0 200 200" class="${commonClasses}">
                <rect x="25" y="20" width="150" height="60" fill="#6EE7B7" stroke="${strokeColor}" stroke-width="3" />
                <rect x="77.5" y="80" width="45" height="90" fill="#6EE7B7" stroke="${strokeColor}" stroke-width="3" />
                <text x="100" y="15" text-anchor="middle" fill="${textColor}" font-size="14" font-weight="bold">10</text>
                <text x="15" y="50" text-anchor="middle" fill="${textColor}" font-size="14" font-weight="bold">4</text>
                <text x="65" y="125" text-anchor="middle" fill="${textColor}" font-size="14" font-weight="bold">6</text>
                <text x="100" y="185" text-anchor="middle" fill="${textColor}" font-size="14" font-weight="bold">3</text>
            </svg>`;
        case "two-squares":
            return `<svg viewBox="0 0 200 200" class="${commonClasses}">
                <rect x="20" y="60" width="120" height="120" fill="#FDBA74" stroke="${strokeColor}" stroke-width="3" />
                <rect x="140" y="120" width="60" height="60" fill="#FDBA74" stroke="${strokeColor}" stroke-width="3" />
                <text x="80" y="55" text-anchor="middle" fill="${textColor}" font-size="16" font-weight="bold">6</text>
                <text x="170" y="115" text-anchor="middle" fill="${textColor}" font-size="16" font-weight="bold">3</text>
            </svg>`;
        case "square-frame":
            return `<svg viewBox="0 0 200 200" class="${commonClasses}">
                <rect x="25" y="25" width="150" height="150" fill="#818CF8" stroke="${strokeColor}" stroke-width="3" />
                <rect x="70" y="70" width="60" height="60" fill="#FFFFFF" stroke="${strokeColor}" stroke-width="2" stroke-dasharray="4,4" />
                <text x="100" y="20" text-anchor="middle" fill="${textColor}" font-size="14" font-weight="bold">10</text>
                <text x="15" y="100" text-anchor="middle" fill="${textColor}" font-size="14" font-weight="bold">10</text>
                <text x="100" y="88" text-anchor="middle" fill="${textColor}" font-size="14" font-weight="bold">4</text>
            </svg>`;
        default:
            return '';
    }
}

// --- 動作函數 ---
function goTips() {
    state.stage = 'tips';
    
    // 重設語音
    aiExplanation = null;
    aiLoading = false;
    isSpeaking = false;
    window.speechSynthesis.cancel();
    
    render();
}

function goHome() {
    state.stage = 'start';
    
    // 重設語音
    aiExplanation = null;
    aiLoading = false;
    isSpeaking = false;
    window.speechSynthesis.cancel();
    
    render();
}

function startGame() {
    state = {
        stage: 'playing',
        currentQIndex: 0,
        score: 0,
        selectedOption: null,
        isAnswerChecked: false,
        showExplanation: false,
        feedbackType: null
    };
    
    aiExplanation = null;
    aiLoading = false;
    isSpeaking = false;
    window.speechSynthesis.cancel();
    
    render();
}

function selectOption(optId) {
    if (state.isAnswerChecked) return;
    state.selectedOption = optId;
    render();
}

function checkAnswer() {
    if (!state.selectedOption) return;
    
    const currentQ = questions[state.currentQIndex];
    const isCorrect = currentQ.options.find(opt => opt.id === state.selectedOption).isCorrect;
    
    state.isAnswerChecked = true;
    
    if (isCorrect) {
        state.score += 10;
        state.feedbackType = 'correct';
        state.showExplanation = true;
    } else {
        state.feedbackType = 'incorrect';
    }
    render();
}

function showExplanation() {
    state.showExplanation = true;
    render();
}

function nextQuestion() {
    if (state.currentQIndex < questions.length - 1) {
        state.currentQIndex++;
        state.selectedOption = null;
        state.isAnswerChecked = false;
        state.showExplanation = false;
        state.feedbackType = null;
        
        // 重設 AI 求解狀態
        aiExplanation = null;
        aiLoading = false;
        isSpeaking = false;
        window.speechSynthesis.cancel();
    } else {
        state.stage = 'result';
    }
    render();
}
