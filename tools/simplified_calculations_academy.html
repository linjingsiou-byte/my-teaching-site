<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林老師的簡化計算魔法學院</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for cute icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent;
        }

        /* 隱藏捲軸但可滾動 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 卡片懸浮動畫 */
        .magic-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .magic-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.15);
        }

        /* 下拉選單客製化，適合手指點擊 */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.5rem center;
            background-size: 1.2em 1.2em;
            padding-right: 2.5rem !important;
        }

        /* 震動動畫 (錯誤提示) */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake-animation { animation: shake 0.3s ease-in-out; }
        
        /* 彈跳動畫 (正確提示) */
        @keyframes bounce-sm {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .bounce-animation { animation: bounce-sm 0.5s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 元件：互動式填空題 (下拉選單，新增浮動引導解析) ---
        const InteractiveBlank = ({ options, correctAnswer, onCorrect, isResolved, placeholder="請選擇", colorClass="text-blue-600 bg-blue-50 border-blue-300", hints }) => {
            const [selected, setSelected] = useState("");
            const [status, setStatus] = useState("idle"); // idle, error, success
            const [hint, setHint] = useState("");

            const handleChange = (e) => {
                const val = e.target.value;
                setSelected(val);
                if (val === correctAnswer) {
                    setStatus("success");
                    setHint("");
                    if(onCorrect) onCorrect();
                } else if (val !== "") {
                    setStatus("error");
                    if (hints && hints[val]) {
                        setHint(hints[val]);
                    } else {
                        setHint("再想想看喔，這個選項不夠簡便。");
                    }
                    // 幾秒後自動隱藏提示並還原狀態
                    setTimeout(() => {
                        setStatus("idle");
                    }, 800);
                } else {
                    setStatus("idle");
                    setHint("");
                }
            };

            // 點選空白處關閉提示
            useEffect(() => {
                if (hint) {
                    const timer = setTimeout(() => setHint(""), 4000);
                    return () => clearTimeout(timer);
                }
            }, [hint]);

            if (isResolved || status === "success") {
                return (
                    <span className={`inline-block px-3 py-1 font-bold rounded-lg border-2 border-transparent ${colorClass.replace('bg-', 'bg-').replace('border-', '')} text-xl mx-1 bounce-animation shadow-sm`}>
                        {correctAnswer} <i className="fa-solid fa-check text-green-500 ml-1 text-sm"></i>
                    </span>
                );
            }

            return (
                <span className="relative inline-block">
                    <select 
                        value={selected} 
                        onChange={handleChange}
                        className={`inline-block text-center text-lg font-bold px-3 py-1 rounded-lg border-2 cursor-pointer outline-none transition-all mx-1 shadow-sm
                            ${status === "error" ? "border-red-400 bg-red-50 text-red-500 shake-animation" : colorClass}
                            ${status === "idle" ? "hover:brightness-95" : ""}
                        `}
                    >
                        <option value="" disabled>{placeholder}</option>
                        {options.map((opt, i) => (
                            <option key={i} value={opt}>{opt}</option>
                        ))}
                    </select>
                    {hint && (
                        <div className="absolute left-1/2 -translate-x-1/2 bottom-full mb-3 bg-slate-800 text-white text-xs rounded-xl py-2.5 px-3 w-56 shadow-xl z-20 text-center leading-relaxed font-bold animate-[fadeIn_0.2s_ease-in-out]">
                            {hint}
                            <div className="absolute top-full left-1/2 -translate-x-1/2 -mt-1 border-4 border-transparent border-t-slate-800"></div>
                        </div>
                    )}
                </span>
            );
        };

        // --- 頁面 1：加與減的魔法 ---
        const AddSubPage = () => {
            return (
                <div className="space-y-6 animate-[fadeIn_0.5s_ease-in-out]">
                    <div className="bg-gradient-to-r from-pink-400 to-rose-400 text-white p-4 rounded-2xl shadow-md flex items-center gap-3">
                        <div className="bg-white/30 p-3 rounded-full"><i className="fa-solid fa-wand-magic-sparkles text-2xl"></i></div>
                        <div>
                            <h2 className="text-2xl font-black tracking-wide">活動 1：加與減的魔法</h2>
                            <p className="text-pink-50">找出好朋友，湊成整十、整百，計算變超快！</p>
                        </div>
                    </div>

                    {/* 觀念 1 */}
                    <div className="magic-card bg-white p-5 rounded-2xl shadow-sm border-t-4 border-pink-400">
                        <div className="flex items-center gap-2 mb-3">
                            <span className="bg-pink-100 text-pink-600 font-black px-3 py-1 rounded-lg">秘訣 1</span>
                            <h3 className="text-xl font-bold text-slate-800">連加：誰跟誰是好朋友？</h3>
                        </div>
                        <div className="text-slate-600 mb-4 bg-slate-50 p-3 rounded-xl border border-slate-100 leading-relaxed text-sm">
                            <b>林老師教學：</b>先找尾數加起來是 <span className="font-bold text-pink-500">10</span> 的數字！這利用了「加法結合律」，先把好朋友綁在一起算，後面就輕鬆多囉！
                        </div>
                        <div className="text-2xl font-bold text-center bg-pink-50/50 py-6 rounded-xl border border-pink-100">
                            <span className="text-slate-700">73 + 49 + </span>
                            <InteractiveBlank 
                                options={["49", "27", "100"]} 
                                correctAnswer="27" 
                                colorClass="text-pink-600 bg-pink-50 border-pink-300"
                                hints={{
                                    "49": "選 49 的話，個位數 3 + 9 = 12，無法湊成整十。看誰的個位數能跟 73 的 3 湊成 10？",
                                    "100": "算式中沒有 100 喔！我們要找原題目中的數字 27，和 73 湊成 100。"
                                }}
                            />
                            <div className="my-3 text-slate-400 text-lg">
                                <i className="fa-solid fa-arrow-down"></i> 把好朋友用括號圈在一起先算
                            </div>
                            <span className="text-slate-700">= ( 73 + 27 ) + 49</span><br/>
                            <span className="text-slate-700">= <span className="text-pink-500">100</span> + 49</span><br/>
                            <span className="text-slate-700">= 149</span>
                        </div>
                    </div>

                    {/* 觀念 2 & 4 結合 */}
                    <div className="magic-card bg-white p-5 rounded-2xl shadow-sm border-t-4 border-blue-400">
                        <div className="flex items-center gap-2 mb-3">
                            <span className="bg-blue-100 text-blue-600 font-black px-3 py-1 rounded-lg">秘訣 2</span>
                            <h3 className="text-xl font-bold text-slate-800">連減 / 先加再減：換個位置更輕鬆</h3>
                        </div>
                        <div className="text-slate-600 mb-4 bg-slate-50 p-3 rounded-xl border border-slate-100 leading-relaxed text-sm">
                            <b>林老師教學：</b>看見能湊成 <span className="font-bold text-blue-500">整數</span> 的，可以帶著數字前面的加減符號「大搬家」！
                            <span className="text-red-500 font-bold block mt-1">⚠️ 警報：搬家時記得要把減號「-」當成行李一起帶走喔！不要寫成 + 23。</span>
                        </div>
                        <div className="text-2xl font-bold text-center bg-blue-50/50 py-6 rounded-xl border border-blue-100 space-y-2">
                            <div className="text-slate-700">73 - 49 - 23</div>
                            <div className="text-slate-400 text-lg"><i className="fa-solid fa-arrow-down"></i> 讓 73 先減 23，個位數都是 3 最好減！</div>
                            <div className="text-slate-700">
                                = ( 73 - 
                                <InteractiveBlank 
                                    options={["49", "23", "50"]} 
                                    correctAnswer="23" 
                                    colorClass="text-blue-600 bg-blue-50 border-blue-300"
                                    hints={{
                                        "49": "如果填 49，73 - 49 = 24，心算不夠直覺。如果先扣除個位數同為 3 的 23，計算變超簡單！",
                                        "50": "算式中原本沒有 50 喔！50 是 73 - 23 算完的結果，搬家時要搬題目裡的 23。"
                                    }}
                                /> ) - 49
                            </div>
                            <div className="text-slate-700">= <span className="text-blue-500">50</span> - 49 = 1</div>
                        </div>
                    </div>

                    {/* 觀念 3 */}
                    <div className="magic-card bg-white p-5 rounded-2xl shadow-sm border-t-4 border-purple-400">
                        <div className="flex items-center gap-2 mb-3">
                            <span className="bg-purple-100 text-purple-600 font-black px-3 py-1 rounded-lg">秘訣 3</span>
                            <h3 className="text-xl font-bold text-slate-800">連續減去兩數 = 減去兩數之「和」</h3>
                        </div>
                        <div className="text-slate-600 mb-4 bg-slate-50 p-3 rounded-xl border border-slate-100 leading-relaxed text-sm">
                            <b>林老師教學：</b>連續扣掉兩個東西，就等於「先把兩件物品的價格加起來，再用總錢數一次扣掉」！這在生活中就像合併結帳。
                        </div>
                        <div className="text-2xl font-bold text-center bg-purple-50/50 py-6 rounded-xl border border-purple-100 space-y-2">
                            <div className="text-slate-700">200 - 73 - 27</div>
                            <div className="text-slate-400 text-lg"><i className="fa-solid fa-arrow-down"></i> 把要扣的數包在括號裡「加」起來一起減</div>
                            <div className="text-slate-700">
                                = 200 - ( 73 <span className="text-purple-500 font-black">+</span> 
                                <InteractiveBlank 
                                    options={["73", "27", "200"]} 
                                    correctAnswer="27" 
                                    colorClass="text-purple-600 bg-purple-50 border-purple-300"
                                    hints={{
                                        "73": "括號裡已經有第一個扣除項 73 了，我們要放的是另一個原本要被減去的數字 27。",
                                        "200": "不能填 200 喔！200 是被減的總金額，括號裡要加的是買的物品價格總和 (73+27)。"
                                    }}
                                /> )
                            </div>
                            <div className="text-slate-700">= 200 - <span className="text-purple-500">100</span></div>
                            <div className="text-slate-700">= 100</div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 頁面 2：乘與除的魔法 ---
        const MulDivPage = () => {
            return (
                <div className="space-y-6 animate-[fadeIn_0.5s_ease-in-out]">
                    <div className="bg-gradient-to-r from-emerald-400 to-teal-400 text-white p-4 rounded-2xl shadow-md flex items-center gap-3">
                        <div className="bg-white/30 p-3 rounded-full"><i className="fa-solid fa-bolt text-2xl"></i></div>
                        <div>
                            <h2 className="text-2xl font-black tracking-wide">活動 2：乘與除的魔法</h2>
                            <p className="text-emerald-50">湊出 10、100、1000，大數字也不怕！</p>
                        </div>
                    </div>

                    {/* 魔法配對卡 */}
                    <div className="magic-card bg-amber-50 p-5 rounded-2xl shadow-sm border border-amber-200">
                        <h3 className="text-xl font-bold text-amber-800 text-center mb-4"><i className="fa-solid fa-star text-amber-500 mr-2"></i>必背！乘法好朋友卡牌</h3>
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <div className="bg-white p-4 rounded-xl shadow-sm text-center border-b-4 border-amber-300">
                                <div className="text-3xl font-black text-amber-600 mb-1">5 × 2</div>
                                <div className="text-xl font-bold text-slate-500">= 10</div>
                            </div>
                            <div className="bg-white p-4 rounded-xl shadow-sm text-center border-b-4 border-orange-400">
                                <div className="text-3xl font-black text-orange-500 mb-1">25 × 4</div>
                                <div className="text-xl font-bold text-slate-500">= 100</div>
                            </div>
                            <div className="bg-white p-4 rounded-xl shadow-sm text-center border-b-4 border-red-400">
                                <div className="text-3xl font-black text-red-500 mb-1">125 × 8</div>
                                <div className="text-xl font-bold text-slate-500">= 1000</div>
                            </div>
                        </div>
                    </div>

                    {/* 觀念 1 */}
                    <div className="magic-card bg-white p-5 rounded-2xl shadow-sm border-t-4 border-emerald-400">
                        <div className="flex items-center gap-2 mb-3">
                            <span className="bg-emerald-100 text-emerald-700 font-black px-3 py-1 rounded-lg">秘訣 4</span>
                            <h3 className="text-xl font-bold text-slate-800">連乘：呼叫好朋友</h3>
                        </div>
                        <div className="text-slate-600 mb-4 bg-slate-50 p-3 rounded-xl border border-slate-100 leading-relaxed text-sm">
                            <b>林老師教學：</b>利用「乘法結合律」，看到 25 或是 125 時，立刻在題目裡尋找它們的乘法超級好朋友（4 或 8），先算成 100 或 1000！
                        </div>
                        <div className="text-2xl font-bold text-center bg-emerald-50/50 py-6 rounded-xl border border-emerald-100 space-y-2">
                            <div className="text-slate-700">25 × 999 × 4</div>
                            <div className="text-slate-400 text-lg"><i className="fa-solid fa-arrow-down"></i> 25 的乘法好朋友是誰？</div>
                            <div className="text-slate-700">
                                = ( 25 × 
                                <InteractiveBlank 
                                    options={["999", "4", "8"]} 
                                    correctAnswer="4" 
                                    colorClass="text-emerald-600 bg-emerald-50 border-emerald-300"
                                    hints={{
                                        "999": "如果先乘 999 數字太大了！看看好朋友卡牌，25 乘以誰能湊成 100？是 4 喔！",
                                        "8": "算式裡沒有 8 喔！8 是 125 的好朋友，而 25 的好朋友是 4。"
                                    }}
                                /> ) × 999
                            </div>
                            <div className="text-slate-700">= <span className="text-emerald-600 font-bold">100</span> × 999</div>
                            <div className="text-slate-700">= 99900</div>
                        </div>
                    </div>

                    {/* 觀念 2 */}
                    <div className="magic-card bg-white p-5 rounded-2xl shadow-sm border-t-4 border-cyan-400">
                        <div className="flex items-center gap-2 mb-3">
                            <span className="bg-cyan-100 text-cyan-700 font-black px-3 py-1 rounded-lg">秘訣 5</span>
                            <h3 className="text-xl font-bold text-slate-800">先乘再除 ＝ 先除再乘</h3>
                        </div>
                        <p className="text-slate-600 mb-4 bg-slate-50 p-3 rounded-xl border border-slate-100 leading-relaxed text-sm">
                            <b>林老師教學：</b>如果先相乘數字會變得太大（如 `33 × 7 = 231` 再除以 3），我們可以搬動除號「÷」，先找能夠整除的數字進行「先除以除數」，把數字變小後乘起來更輕鬆！
                        </p>
                        <div className="text-2xl font-bold text-center bg-cyan-50/50 py-6 rounded-xl border border-cyan-100 space-y-2">
                            <div className="text-slate-700">33 × 7 ÷ 3</div>
                            <div className="text-slate-400 text-lg"><i className="fa-solid fa-arrow-down"></i> 33 能被 3 整除，帶著除號「÷ 3」搬到前面先算！</div>
                            <div className="text-slate-700">
                                = ( 33 ÷ 
                                <InteractiveBlank 
                                    options={["7", "3", "11"]} 
                                    correctAnswer="3" 
                                    colorClass="text-cyan-600 bg-cyan-50 border-cyan-300"
                                    hints={{
                                        "7": "33 沒有辦法被 7 整除喔！如果先算 33 ÷ 7 就會出現分數，變得更難算了！",
                                        "11": "算式裡沒有 11 喔！11 是 33 ÷ 3 算出來的結果，還沒除之前要選題目裡的除數 3。"
                                    }}
                                /> ) × 7
                            </div>
                            <div className="text-slate-700">= <span className="text-cyan-600 font-bold">11</span> × 7</div>
                            <div className="text-slate-700">= 77</div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 頁面 3：總結圖表 ---
        const SummaryPage = () => {
            return (
                <div className="space-y-6 animate-[fadeIn_0.5s_ease-in-out]">
                    <div className="bg-gradient-to-r from-violet-500 to-fuchsia-500 text-white p-4 rounded-2xl shadow-md flex items-center gap-3">
                        <div className="bg-white/30 p-3 rounded-full"><i className="fa-solid fa-book-open text-2xl"></i></div>
                        <div>
                            <h2 className="text-2xl font-black tracking-wide">林老師的簡化計算秘笈</h2>
                            <p className="text-violet-100">靈活應用交換律與結合律，大數變小數！</p>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-100 text-slate-700 border-b border-slate-200">
                                        <th className="p-4 font-black w-1/4">活動</th>
                                        <th className="p-4 font-black w-1/3">計算口訣 / 規則</th>
                                        <th className="p-4 font-black">範例對照</th>
                                    </tr>
                                </thead>
                                <tbody className="text-base md:text-lg">
                                    <tr className="border-b border-slate-100 hover:bg-pink-50 transition-colors">
                                        <td className="p-4 font-bold text-pink-600"><i className="fa-solid fa-plus mr-2"></i>連加</td>
                                        <td className="p-4 text-slate-600 text-sm md:text-base">找尾數湊十，改順序先加（結合律）</td>
                                        <td className="p-4 font-mono font-bold text-slate-700"><span className="text-pink-500">73</span> + 49 <span className="text-pink-500">+ 27</span><br/>= <span className="text-pink-500">(73 + 27)</span> + 49 = 149</td>
                                    </tr>
                                    <tr className="border-b border-slate-100 hover:bg-blue-50 transition-colors">
                                        <td className="p-4 font-bold text-blue-600"><i className="fa-solid fa-minus mr-2"></i>連減</td>
                                        <td className="p-4 text-slate-600 text-sm md:text-base">搬移位置先減（連符號一起搬移）</td>
                                        <td className="p-4 font-mono font-bold text-slate-700"><span className="text-blue-500">73</span> - 49 <span className="text-blue-500">- 23</span><br/>= <span className="text-blue-500">(73 - 23)</span> - 49 = 1</td>
                                    </tr>
                                    <tr className="border-b border-slate-100 hover:bg-purple-50 transition-colors">
                                        <td className="p-4 font-bold text-purple-600"><i className="fa-solid fa-object-group mr-2"></i>連減兩數</td>
                                        <td className="p-4 text-slate-600 text-sm md:text-base">等於直接減去兩數的「和」</td>
                                        <td className="p-4 font-mono font-bold text-slate-700">200 <span className="text-purple-500">- 73 - 27</span><br/>= 200 - <span className="text-purple-500">(73 + 27)</span> = 100</td>
                                    </tr>
                                    <tr className="border-b border-slate-100 hover:bg-emerald-50 transition-colors">
                                        <td className="p-4 font-bold text-emerald-600"><i className="fa-solid fa-xmark mr-2"></i>連乘</td>
                                        <td className="p-4 text-slate-600 text-sm md:text-base">找好朋友配對：5×2, 25×4, 125×8</td>
                                        <td className="p-4 font-mono font-bold text-slate-700"><span className="text-emerald-500">25</span> × 999 <span className="text-emerald-500">× 4</span><br/>= <span className="text-emerald-500">(25 × 4)</span> × 999 = 99900</td>
                                    </tr>
                                    <tr className="hover:bg-cyan-50 transition-colors">
                                        <td className="p-4 font-bold text-cyan-600"><i className="fa-solid fa-divide mr-2"></i>乘與除</td>
                                        <td className="p-4 text-slate-600 text-sm md:text-base">調整除法順序，先除以能整除的數</td>
