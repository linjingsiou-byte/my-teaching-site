<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- 引入 Tailwind CSS -->

        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 背景氣泡飄浮動畫 */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.45);
            bottom: -150px;
            animation: float 15s infinite ease-in-out;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            50% { transform: translateY(-60vh) translateX(50px) rotate(180deg); opacity: 0.6; border-radius: 50%; }
            100% { transform: translateY(-120vh) translateX(-50px) rotate(360deg); opacity: 0; }
        }

        /* 簡單的淡入動畫 */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 卡片懸浮與縮放效果 */
        .detective-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .detective-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 via-purple-50 to-blue-100 text-gray-800 min-h-screen relative overflow-x-hidden flex flex-col justify-between">

    <!-- 背景氣泡層 -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="bubble w-12 h-12 left-10" style="animation-delay: 0s; animation-duration: 12s;"></div>
        <div class="bubble w-20 h-20 left-1/4" style="animation-delay: 2s; animation-duration: 18s;"></div>
        <div class="bubble w-16 h-16 left-1/2" style="animation-delay: 4s; animation-duration: 14s;"></div>
        <div class="bubble w-24 h-24 left-3/4" style="animation-delay: 1s; animation-duration: 20s;"></div>
        <div class="bubble w-10 h-10 left-[90%]" style="animation-delay: 6s; animation-duration: 10s;"></div>
    </div>

    <!-- 主要應用程式容器 -->
    <div id="app" class="w-full flex-grow flex flex-col items-center p-4 z-10 relative"></div>

    <!-- API Key 設定彈窗 -->

        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl border border-slate-100 animate-fade-in text-left">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-gear text-slate-500"></i> 設定 Gemini API Key
                </h3>
                <button onclick="toggleSettingsModal()" class="text-slate-400 hover:text-slate-600">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <p class="text-slate-500 text-sm mb-4 leading-relaxed font-medium">
                「AI 探長助教」功能需要使用 Gemini API。金鑰將儲存於您的瀏覽器中，不會上傳至其他伺服器。
            </p>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Gemini API Key</label>
                    <input type="password" id="api-key-input" placeholder="貼上您的 API Key (AIzaSy...)" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-400 font-mono text-sm" />
                </div>
                <div class="flex gap-3">
                    <button onclick="saveApiKey()" class="flex-1 bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 rounded-xl shadow-md transition">
                        儲存設定
                    </button>
                    <button onclick="clearApiKey()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-xl transition">
                        清除金鑰

                </div>
                <p class="text-xs text-slate-400 text-center">
                    沒有金鑰？可至 Google AI Studio 免費申請。
                </p>
            </div>
        </div>
    </div>

<script>
    // --- 應用程式狀態 ---
    let state = {
        currentStage: 'intro', // 'intro', 'tutorial', 'game18', 'game25', 'summary'
        tutorialStep: 0,       // 0 to 2
        game18Index: 0,        // 0 to 2
        game25Index: 0,        // 0 to 1
        showRuler: false,
        feedback: null         // null or { type: 'success'|'error', message: '...', onNext: func }
    };

    // AI Tutor 狀態
    let aiExplanation = null;
    let aiLoading = false;
    let isSpeaking = false;
    let currentUtterance = null;

    // AI 結案報告故事狀態
    let aiStory = null;
    let aiStoryLoading = false;

    // --- 關卡與題目資料庫 ---
    const game18Questions = [
        {
            id: 1,
            title: "第一關：認識角 A",
            type: "compare_single",
            clockTime: { h: 2, m: 0 },
            angleName: "角 A",
            correct: "small",
            question: "請看時針和分針夾出的「角 A」，它比直角大還是小？",

            options: [
                { id: "small", text: "比直角小", hint: "正確！角A（2點鐘）的開口比直角（3點鐘）小，看起來尖尖的。" },
                { id: "big", text: "比直角大", hint: "你可以點擊右上角的「顯示直角尺」來比比看喔！" },
                { id: "equal", text: "一樣大", hint: "仔細看，2點鐘的開口有像3點鐘那麼開嗎？" }
            ]
        },
        {
            id: 2,
            title: "第二關：認識角 B",
            type: "compare_single",
            clockTime: { h: 5, m: 0 },
            angleName: "角 B",
            correct: "big",
            question: "請看時針和分針夾出的「角 B」，它比直角大還是小？",
            aiHint: "🕵️‍♂️ 探長提示：哇！這個角的嘴巴張得好大！拿直角尺（3點鐘）來量量看，它是不是比直角還要『胖』？胖胖的就是比直角大喔！🕰️",
            options: [
                { id: "small", text: "比直角小", hint: "嗯？看起來它的嘴巴張得很大喔！" },
                { id: "big", text: "比直角大", hint: "沒錯！角B（5點鐘）的開口明顯超過了直角（3點鐘）。" },
                { id: "equal", text: "一樣大", hint: "不一樣喔，5點鐘比3點鐘張得更開。" }
            ]
        },
        {
            id: 3,
            title: "第三關：A 與 B 誰大？",
            type: "compare_two",
            clockA: { h: 2, m: 0, name: "角A" },
            clockB: { h: 5, m: 0, name: "角B" },
            correct: "B",
            question: "終極任務：比較角 A 和 角 B，哪一個比較大？",
            aiHint: "🕵️‍♂️ 探長提示：這是一場體重比賽！角 A 比直角瘦（銳角），角 B 比直角胖（鈍角）。你想想，瘦子跟胖子誰比較大呢？🤔",
            options: [
                { id: "A", text: "角 A 比較大", hint: "想想看：角A比直角小，角B比直角大..." },
                { id: "B", text: "角 B 比較大", hint: "太棒了！角A < 直角 < 角B，所以角B最大！" },
                { id: "equal", text: "一樣大", hint: "它們張開的大小不一樣喔！" }
            ]
        }
    ];

    const game25Questions = [
        {
            id: 1,
            title: "時間大挑戰",
            clockA: { h: 1, m: 0 },
            clockB: { h: 3, m: 0 },
            correct: "B",
            question: "哪一個時刻，時針和分針的夾角比較大？",
            aiHint: "🕵️‍♂️ 探長提示：別被數字騙了！看指針張開的肚子有多大。3點鐘是標準的『直角』，1點鐘才張開一點點。誰的肚子比較大呢？✨",
            options: [
                { id: "A", text: "1 點整", hint: "1點整只有一小格，3點整是直角(3大格)喔！" },
                { id: "B", text: "3 點整", hint: "正確！3點整是直角，比1點整的角度大多了。" },
                { id: "equal", text: "一樣大", hint: "仔細看指針張開的幅度，明顯不同喔。" }
            ]
        },
        {
            id: 2,
            title: "陷阱題！小心！",
            clockA: { h: 9, m: 0 },
            clockB: { h: 3, m: 0 },
            correct: "equal",
            question: "哪一個時刻，時針和分針的夾角比較大？",
            aiHint: "🕵️‍♂️ 探長提示：這是一個超級陷阱！左邊是9點，右邊是3點。雖然方向不一樣，但是它們張開的『姿勢』是不是一模一樣呢？都是標準的直角喔！⚖️",
            options: [
                { id: "A", text: "9 點整", hint: "雖然方向不同，但張開的大小是不是一樣呢？" },
                { id: "B", text: "3 點整", hint: "再檢查一次，9點和3點都是直角喔！" },
                { id: "equal", text: "一樣大", hint: "太厲害了！不管開口朝左還是朝右，只要張開幅度一樣就是一樣大。" }
            ]
        }
    ];

    const fallbackStories = [
        "恭喜你！經過這場特訓，你已經是能夠一眼看穿『直角』、『銳角』和『鈍角』的超級偵探了！連最難的陷阱題都難不倒你，太優秀了！✨🕰️🔍",
        "太強了！你成功破解了時鐘的所有謎題！現在你已經擁有『直角之眼』，不管指針怎麼轉，都逃不過你的眼睛。繼續保持這份好奇心吧！🌟📐👮‍♂️",
        "真不敢相信！你竟然這麼快就破案了！從今天起，你就是『角度偵探社』的王牌探員。記得，心中的那把尺要隨時拿出來用喔！💖🔥💯"
    ];

    // --- API Key 管理 ---
    function getApiKey() {
        return localStorage.getItem('gemini_api_key') || '';
    }

    function toggleSettingsModal() {
        const modal = document.getElementById('settings-modal');
        const input = document.getElementById('api-key-input');
        input.value = getApiKey();
        modal.classList.toggle('hidden');
    }

    function saveApiKey() {
        const input = document.getElementById('api-key-input');
        const key = input.value.trim();
        if (key) {
            localStorage.setItem('gemini_api_key', key);
            alert('API Key 儲存成功！');
        } else {
            localStorage.removeItem('gemini_api_key');
            alert('已清除 API Key。');
        }
        toggleSettingsModal();
        render();
    }

    function clearApiKey() {
        localStorage.removeItem('gemini_api_key');
        const input = document.getElementById('api-key-input');
        input.value = '';
        alert('已清除 API Key。');
        toggleSettingsModal();
        render();
    }

    // --- AI Tutor API 呼叫 ---
    async function callGeminiAPI(prompt, apiKey, retries = 3, delay = 1000) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const payload = { contents: [{ parts: [{ text: prompt }] }] };

        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error(`API call failed: ${response.status}`);
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，AI 老師現在有點忙，請稍後再試。";
            } catch (error) {
                if (i === retries - 1) throw error;
                await new Promise(resolve => setTimeout(resolve, delay * Math.pow(2, i)));
            }
        }
    }

    async function handleAskAI() {
        const key = getApiKey();
        if (!key) {
            alert('請點選右上角齒輪設定 Gemini API Key，即可召喚 AI 探長為您解惑！');
            toggleSettingsModal();
            return;
        }

        aiLoading = true;
        aiExplanation = null;
        render();

        let questionText = "";
        let hintText = "";
        if (state.currentStage === 'game18') {
            const q = game18Questions[state.game18Index];
            questionText = q.question;
            hintText = q.aiHint;
        } else if (state.currentStage === 'game25') {
            const q = game25Questions[state.game25Index];
            questionText = q.question;
            hintText = q.aiHint;
        }

        const prompt = `你現在是一位超級會教數學的國小老師，也是「時鐘角度偵探社」的探長。請根據以下資訊，引導新進偵探隊員找到時鐘夾角的秘密：
        【題目資訊】
        - 適合年級：國小中低年級 (三年級/四年級) 角度與時鐘夾角單元
        - 題目目標：${questionText}
        - 簡要詳解與思路提示：${hintText}

        【您的任務】
        1. 請使用國小三年級（8-9歲）聽得懂的簡單詞彙，語氣要活潑、自信、富有「探案解謎」的樂趣，多使用「偵探隊員你好！」、「讓我們拿出放大鏡觀察這個時鐘」等偵探口吻。
        2. 請「不要」直接透露計算結果或最終正確答案選項（例如不要直接說出應該選『比直角小』、『比直角大』、『3點整』、『一樣大』）。
        3. 您的引導重點是分析圖形特徵與張開幅度：
           - 鼓勵他們看「時針和分針的夾角」，並與「3點整的直角」作對照。
           - 引導他們觀察：「時針跟分針張開的肚子是大還是小？」、「雖然9點和3點方向不同，但是張開的姿勢是不是一模一樣呢？」
        4. 輸出排版請包含適當的換行與 emoji，增加趣味。
        5. 最後給予隊員溫暖且激勵的探案肯定。
        請使用繁體中文回答。`;

        try {
            const result = await callGeminiAPI(prompt, key);
            aiExplanation = result;
        } catch (error) {
            aiExplanation = "報告探員！總部通訊被雷雨干擾，請檢查金鑰設定。";
        } finally {
            aiLoading = false;
            render();
        }
    }

    function handleSpeak() {
        if (isSpeaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
            render();
        } else {
            if (!aiExplanation) return;
            const cleanText = aiExplanation.replace(/[\*#_`~]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'zh-TW';
            utterance.rate = 0.95;
            utterance.onend = () => {
                isSpeaking = false;
                render();
            };
            utterance.onerror = () => {
                isSpeaking = false;
                render();
            };
            window.speechSynthesis.speak(utterance);
            isSpeaking = true;
            currentUtterance = utterance;
            render();
        }
    }

    // --- AI 結案報告故事生成 ---
    async function generateAiStory() {
        const key = getApiKey();
        if (!key) {
            // 沒有 API Key，隨機輪播預設故事
            aiStoryLoading = true;
            render();
            setTimeout(() => {
                const randomStory = fallbackStories[Math.floor(Math.random() * fallbackStories.length)];
                aiStory = randomStory;
                aiStoryLoading = false;
                render();
            }, 1000);
            return;
        }

        aiStoryLoading = true;
        render();

        const prompt = `你現在是「時鐘角度偵探社」的總部大探長。一位小偵探剛剛成功通過了所有時鐘角度挑戰（包括判斷2點鐘、5點鐘與直角的關係，以及比較9點鐘與3點鐘角度大小的經典陷阱題）。
        請為他寫一份充滿熱情、幽默且富有數學教育啟發的「結案報告故事」。
        要求：
        1. 使用適合國小學童（8-10歲）的語調，以熱烈的語氣讚揚他的偵探直覺。
        2. 提及他避開了「3點整和9點整是同等角度」的聰明陷阱。
        3. 字數在 150 字以內，並多放些可愛的 emoji（時鐘、放大鏡、皇冠、獎牌等）。
        請用繁體中文回答。`;

        try {
            const result = await callGeminiAPI(prompt, key);
            aiStory = result;
        } catch (error) {
            aiStory = fallbackStories[0];
        } finally {
            aiStoryLoading = false;
            render();
        }
    }

    // --- SVG 時鐘渲染器 ---
    function getClockFaceHTML(hour, minute, label = "", size = "large", showRulerOverlay = false, showSecondHand = true) {
        const minuteAngle = minute * 6;
        const hourAngle = (hour % 12) * 30 + (minute / 2);
        const secondAngle = 180;

        const r = size === "large" ? 80 : 50;
        const center = size === "large" ? 100 : 70;
        const viewboxSize = size === "large" ? 200 : 140;

        const getHandCoords = (angle, length) => {
            const rad = (angle - 90) * (Math.PI / 180);
            return {
                x: center + length * Math.cos(rad),
                y: center + length * Math.sin(rad)
            };
        };

        const hourCoords = getHandCoords(hourAngle, r * 0.6);
        const minuteCoords = getHandCoords(minuteAngle, r * 0.9);
        const secondCoords = getHandCoords(secondAngle, r * 0.95);

        // 生成刻度
        let ticksHTML = '';
        for (let i = 0; i < 12; i++) {
            const angle = i * 30;
            const rad = (angle - 90) * (Math.PI / 180);
            const x1 = center + (r - 5) * Math.cos(rad);
            const y1 = center + (r - 5) * Math.sin(rad);
            const x2 = center + r * Math.cos(rad);
            const y2 = center + r * Math.sin(rad);
            ticksHTML += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#CBD5E1" stroke-width="2" />`;
        }

        // 夾角扇形弧線 (Arc)
        const hourRad = (hourAngle - 90) * (Math.PI / 180);
        const arcX = center + 18 * Math.cos(hourRad);
        const arcY = center + 18 * Math.sin(hourRad);
        // 計算角度差，判斷大圓角標記 (0 = 順時鐘，1 = 逆時鐘)
        const diff = (hourAngle - 0 + 360) % 360;
        const largeArc = diff > 180 ? 1 : 0;
        const arcPath = `M ${center + 18} ${center} A 18 18 0 ${largeArc} 1 ${arcX} ${arcY}`;

        // 直角尺覆蓋圖層 (Ruler Overlay)
        let rulerHTML = '';
        if (showRulerOverlay) {
            rulerHTML = `
                <g opacity="0.6">
                   <path d="M ${center} ${center} L ${center} ${center - r} A ${r} ${r} 0 0 1 ${center + r} ${center} L ${center} ${center}" fill="rgba(255, 215, 0, 0.3)" stroke="orange" stroke-width="2" />
                   <text x="${center + 10}" y="${center - 10}" font-size="10" fill="brown" font-weight="bold">直角尺</text>
                </g>
            `;
        }

        // 標籤 (Label)
        let labelHTML = '';
        if (label) {
            labelHTML = `
                <div class="absolute -top-3 -left-3 bg-yellow-400 text-yellow-900 font-bold px-3 py-1 rounded-full shadow-md transform -rotate-12 border-2 border-white text-xs md:text-sm">
                    ${label}
                </div>
            `;
        }

        const secondHandHTML = showSecondHand ? `<line x1="${center}" y1="${center}" x2="${secondCoords.x}" y2="${secondCoords.y}" stroke="#94A3B8" stroke-width="1" stroke-linecap="round" />` : '';

        const displayTime = `${hour}:${minute === 0 ? '00' : minute}`;

        return `
            <div class="flex flex-col items-center mx-2 relative fade-in">
                <div class="relative">
                    <svg width="${viewboxSize}" height="${viewboxSize}" class="bg-white rounded-full shadow-lg border-4 border-slate-200">
                        <!-- 刻度 -->
                        ${ticksHTML}

                        <!-- 夾角弧度指示器 -->

    // --- 動作函數 ---
    function goIntro() {
        state.currentStage = 'intro';
        state.tutorialStep = 0;
        state.game18Index = 0;
        state.game25Index = 0;
        state.showRuler = false;
        state.feedback = null;

        aiExplanation = null;
        aiLoading = false;
        isSpeaking = false;
        window.speechSynthesis.cancel();
        
        aiStory = null;
        aiStoryLoading = false;

        render();
    }

    function startTutorial() {
        state.currentStage = 'tutorial';
        state.tutorialStep = 0;
        render();
    }

    function nextTutorial() {
        if (state.tutorialStep < 2) {
            state.tutorialStep++;
            render();
        } else {
            state.currentStage = 'game18';
            state.game18Index = 0;
            state.showRuler = false;
            render();
        }
    }

    function handleGame18Answer(optionId) {
        const q = game18Questions[state.game18Index];
        const opt = q.options.find(o => o.id === optionId);

        if (optionId === q.correct) {
            // 答對了
            state.feedback = {
                type: 'success',
                message: opt.hint,
                onNext: () => {
                    state.feedback = null;
                    if (state.game18Index < game18Questions.length - 1) {
                        state.game18Index++;
                        state.showRuler = false;
                    } else {
                        state.currentStage = 'game25';
                        state.game25Index = 0;
                    }
                    // 重設 AI 狀態
                    aiExplanation = null;
                    aiLoading = false;
                    isSpeaking = false;
                    window.speechSynthesis.cancel();
                    render();
                }
            };
            confetti({
                particleCount: 80,
                spread: 60,
                origin: { y: 0.7 }
            });
        } else {
            // 答錯了
            state.feedback = {
                type: 'error',
                message: opt.hint,
                onNext: () => {
                    state.feedback = null;
                    render();
                }
            };
        }
        render();
    }

    function handleGame25Answer(optionId) {
        const q = game25Questions[state.game25Index];
        const opt = q.options.find(o => o.id === optionId);

        if (optionId === q.correct) {
            // 答對了
            state.feedback = {
                type: 'success',
                message: opt.hint,
                onNext: () => {
                    state.feedback = null;
                    if (state.game25Index < game25Questions.length - 1) {
                        state.game25Index++;
                    } else {
                        state.currentStage = 'summary';
                    }
                    // 重設 AI 狀態
                    aiExplanation = null;
                    aiLoading = false;
                    isSpeaking = false;
                    window.speechSynthesis.cancel();
                    render();
                }
            };
            confetti({
                particleCount: 80,
                spread: 60,
                origin: { y: 0.7 }
            });
        } else {
            // 答錯了
            state.feedback = {
                type: 'error',
                message: opt.hint,
                onNext: () => {
                    state.feedback = null;
                    render();
                }
            };
        }
        render();
    }

        state.showRuler = !state.showRuler;
