// 洗牌函式
function shuffleArray(array) {
    let currentIndex = array.length, randomIndex;
    while (currentIndex !== 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
    }
    return array;
}

// --- AI Tutor API 呼叫 ---
async function callGeminiAPI(prompt, apiKey, retries = 3, delay = 1000) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
    const payload = { contents: [{ parts: [{ text: prompt }] }] };

    for (let i = 0; i < retries; i++) {
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error(`API call failed: ${response.status}`);
            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，成語大師現在有點忙，請稍後再試。";
        } catch (error) {
            if (i === retries - 1) throw error;
            await new Promise(resolve => setTimeout(resolve, delay * Math.pow(2, i)));
        }
    }
}

    const prompt = `你現在是一位非常擅長用趣味方式引導學生的「國小成語大師」助教。
    正在進行「成語猜猜樂（我說你猜）」的遊戲，說題者（看著畫面的孩子）目前不知道要怎麼描述這個成語，需要你的暗示。
    
    【任務成語】
    - 成語名稱：${currentItem.word}
    - 成語釋義：${currentItem.desc}
    
    【限制條件 - 極度重要】
    1. 你的回答「絕對不能」包含成語中的任何一個字（禁用字：${forbiddenChars}）。也不要使用同音異義字，否則遊戲就會破功！
    2. 請用簡單有趣、適合國小三年級或四年級學生（9-10歲）聽得懂的話來引導。
    
    【回答格式】
    請提供以下三個部分，並使用活潑的語氣：
    ✨ **比手畫腳小秘笈**：教說題者怎麼用動作、或是生活中的小比喻（例如：「你可以比出一個...」、「想像你正在...」）來引導對方，不能直接說出字喔！
    💡 **成語大搜查 (不含答案字)**：把這個成語的意思，包裝成一個生活中的趣味情境（例如：「當你的好朋友明明做錯事卻不承認，還...」）。
    📝 **生活造句 (不含答案字)**：用這個成語造一個句子，但把成語的地方用「____」或「這個成語」代替，讓大家去填空。
    
    請使用繁體中文回答，排版保持精美且多用 emoji！`;

    try {
        const result = await callGeminiAPI(prompt, key);
        aiExplanation = result;
    } catch (error) {
        aiExplanation = "報告！與成語大師的通訊中斷，請檢查網路或金鑰設定。";
    } finally {
        aiLoading = false;
        render();
    }
}

function handleSpeak() {
    if (isSpeaking) {
        window.speechSynthesis.cancel();
        isSpeaking = false;
        render();
    } else {
        if (!aiExplanation) return;
        const cleanText = aiExplanation.replace(/[\*#_`~]/g, '');
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.95;
        utterance.onend = () => {
            isSpeaking = false;
            render();
        };
        utterance.onerror = () => {
            isSpeaking = false;
            render();
        };
        window.speechSynthesis.speak(utterance);
        isSpeaking = true;
        currentUtterance = utterance;
        render();
    }
}

// 遊戲控制
function goHome() {
    clearInterval(timerInterval);
    state.stage = 'menu';
    resetAI();
    render();
}

function resetAI() {
    aiExplanation = null;
    aiLoading = false;
    isSpeaking = false;
    window.speechSynthesis.cancel();
}

function startGame(categoryKey) {
    const category = idiomDatabase[categoryKey];
    state.stage = 'playing';
    state.currentCategory = category;
    state.currentCategoryKey = categoryKey;
    state.gameQueue = shuffleArray([...category.items]);
    state.currentIndex = 0;
    state.score = 0;
    state.timeLeft = 60;
    state.results = [];
    
    resetAI();
    
    // 開始計時
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (state.timeLeft > 0) {
            state.timeLeft--;
            const timerLabel = document.getElementById('timer-label');
            if (timerLabel) {
                timerLabel.textContent = `${state.timeLeft}s`;
                if (state.timeLeft <= 10) {
                    timerLabel.classList.add('text-red-500', 'animate-pulse', 'text-3xl');
                }
            }
        } else {
            endGame();
        }
    }, 1000);
    
    render();
}

function handleAnswer(isCorrect) {
    const currentItem = state.gameQueue[state.currentIndex];
    state.results.push({ ...currentItem, correct: isCorrect });
    
    if (isCorrect) {
        state.score++;
        // 答對時噴灑碎紙花
        confetti({
            particleCount: 80,
            spread: 60,
            origin: { y: 0.8 }
        });
    }
    
    resetAI();
    
    if (state.currentIndex < state.gameQueue.length - 1) {
        state.currentIndex++;
        render();
    } else {
        endGame();
    }
}

function endGame() {
    clearInterval(timerInterval);
    state.stage = 'finished';
    resetAI();
    render();
}
