    // --- 工具函式：洗牌 ---
    function shuffleArray(array) {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    }

    // --- API Key 管理 ---
    function getApiKey() {
      return localStorage.getItem('gemini_api_key') || '';
    }

    function toggleSettingsModal() {
      const modal = document.getElementById('settings-modal');
      const input = document.getElementById('api-key-input');
      input.value = getApiKey();
      modal.classList.toggle('hidden');
    }

    function saveApiKey() {
      const input = document.getElementById('api-key-input');
      const key = input.value.trim();
      if (key) {
        localStorage.setItem('gemini_api_key', key);
        alert('API Key 儲存成功！');
      } else {
        localStorage.removeItem('gemini_api_key');
        alert('已清除 API Key。');
      }
      toggleSettingsModal();
      render();
    }

    function clearApiKey() {
      localStorage.removeItem('gemini_api_key');
      const input = document.getElementById('api-key-input');
      input.value = '';
      alert('已清除 API Key。');
      toggleSettingsModal();
      render();
    }

    // --- AI Tutor 邏輯 ---
    async function callGeminiAPI(prompt, apiKey, retries = 3, delay = 1000) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const payload = { contents: [{ parts: [{ text: prompt }] }] };

      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error(`API call failed: ${response.status}`);
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，AI 老師現在有點忙，請稍後再試。";
        } catch (error) {
          if (i === retries - 1) throw error;
          await new Promise(resolve => setTimeout(resolve, delay * Math.pow(2, i)));
        }
      }
    }

    async function handleAskAI() {
      const key = getApiKey();
      if (!key) {
        alert('請先點選右上角齒輪設定 Gemini API Key 才能呼叫 AI 老師喔！');

        return;

      aiExplanation = null;
      render();

        toneInstruction = "請使用國小低年級（7-8歲）聽得懂的簡單詞彙。句子要短，語氣要非常可愛親切，多用「我們一起看」、「你有發現嗎」這樣的口吻。避免艱澀的數學名詞，多用生活化的比喻。";
      } else if (question.level === 2) {
        toneInstruction = "請使用國小中年級（9-10歲）的語言。語氣活潑且帶有引導性，鼓勵學生觀察倍數和平分的關係。可以適度使用「倍」、「平分」等詞彙，但解釋要清楚。";
      } else {
        toneInstruction = "請使用國小高年級（11-12歲）的語言。語氣要像朋友一樣的討論，引導邏輯思考，解釋基準量和比較量的概念，幫助他們建立抽象思維。";
      }

      const prompt = `你現在是一位超級會教數學的國小老師。請根據以下資訊，引導學生解題：
      【題目資訊】
      - 適合年級：${question.grade}
      - 題目情境：${question.context}
      - 核心概念：${question.title}
      - 題目描述：${question.desc}
      - 數值數據：${JSON.stringify(question.data)}
      - 問題目標：${question.question}

      【你的任務】
      1. ${toneInstruction}
      2. 請「不要」直接給出計算結果或最終答案。
      3. 你的重點是引導學生「看懂線段圖」。例如：
         - "看看這兩條線，哪一條比較長？"
         - "括號括起來的地方代表什麼意思呢？"
         - "虛線的部分是不是就是相差的地方？"
      4. 輸出格式請包含適當的換行和 emoji，讓版面好讀。
      5. 最後給學生一個溫慢的鼓勵。
      請用繁體中文回答。`;

      try {
        const result = await callGeminiAPI(prompt, key);
        aiExplanation = result;
      } catch (error) {
        aiExplanation = "抱歉，AI 老師現在連線有點不穩定，請確認您的 API Key 是否正確或稍後再試。";
      } finally {
        aiLoading = false;
        render();
      }
    }

    function handleSpeak() {
      if (isSpeaking) {
        window.speechSynthesis.cancel();
        isSpeaking = false;
        render();
      } else {
        if (!aiExplanation) return;
        // 清理文字，移除 markdown 常用符號以防朗讀怪異
        const cleanText = aiExplanation.replace(/[\*#_`~]/g, '');
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.95;
        utterance.onend = () => {
          isSpeaking = false;
          render();
        };
        utterance.onerror = () => {
          isSpeaking = false;
          render();
        };
        window.speechSynthesis.speak(utterance);
        isSpeaking = true;
        currentUtterance = utterance;
        render();
      }
    }

    // --- 繪製 SVG 線段圖 ---
    function renderSvgDiagram(type, data) {
      const width = 360; 
      const height = 220;
      const strokeColor = "#475569";
      const textColor = "#1e293b";
      
      const drawBraceTop = (x, y, w) => `M${x},${y} Q${x},${y-10} ${x+5},${y-10} L${x+w/2-5},${y-10} Q${x+w/2},${y-10} ${x+w/2},${y-20} Q${x+w/2},${y-10} ${x+w/2+5},${y-10} L${x+w-5},${y-10} Q${x+w},${y-10} ${x+w},${y}`;
      const drawBraceBottom = (x, y, w) => `M${x},${y} Q${x},${y+10} ${x+5},${y+10} L${x+w/2-5},${y+10} Q${x+w/2},${y+10} ${x+w/2},${y+20} Q${x+w/2},${y+10} ${x+w/2+5},${y+10} L${x+w-5},${y+10} Q${x+w},${y+10} ${x+w},${y}`;
      const drawBraceRight = (x, y, h) => `M${x},${y} Q${x+10},${y} ${x+10},${y+5} L${x+10},${y+h/2-5} Q${x+10},${y+h/2} ${x+20},${y+h/2} Q${x+10},${y+h/2} ${x+10},${y+h/2+5} L${x+10},${y+h-5} Q${x+10},${y+h} ${x},${y+h}`;

      if (type === 'linear_combine') {
        const totalVal = data.part1 + data.part2;
        const maxWidth = 260;
        const w1 = (data.part1 / totalVal) * maxWidth;
        const w2 = (data.part2 / totalVal) * maxWidth;
        const startX = (width - maxWidth) / 2;
        return `
          <svg viewBox="0 0 ${width} ${height}" class="w-full h-full">
            <rect x="${startX}" y="90" width="${w1}" height="40" fill="#FF6B6B" rx="4" />
            <text x="${startX + w1/2}" y="115" text-anchor="middle" fill="white" font-weight="bold">${data.part1}${data.unit}</text>
            <rect x="${startX + w1 + 5}" y="90" width="${w2}" height="40" fill="#4D96FF" rx="4" />
            <text x="${startX + w1 + 5 + w2/2}" y="115" text-anchor="middle" fill="white" font-weight="bold">${data.part2}${data.unit}</text>
            <path d="${drawBraceTop(startX, 85, w1 + w2 + 5)}" fill="none" stroke="${strokeColor}" stroke-width="2" />
            <circle cx="${startX + (w1+w2)/2}" cy="55" r="14" fill="#FFE66D" stroke="${strokeColor}" stroke-width="2" />
            <text x="${startX + (w1+w2)/2}" y="60" text-anchor="middle" font-size="18" font-weight="bold">?</text>
            <text x="${startX + (w1+w2)/2}" y="35" text-anchor="middle" font-size="14" fill="${textColor}">合起來</text>
          </svg>
        `;
      }

      if (type === 'linear_remaining') {
        const maxWidth = 260;
        const startX = (width - maxWidth) / 2;
        const wRemove = (data.remove / data.total) * maxWidth;
        const wRemain = maxWidth - wRemove;
        return `
          <svg viewBox="0 0 ${width} ${height}" class="w-full h-full">
            <rect x="${startX}" y="90" width="${maxWidth}" height="40" fill="#E2E8F0" stroke="${strokeColor}" stroke-dasharray="5,5" rx="4" />
            <rect x="${startX}" y="90" width="${wRemain}" height="40" fill="#6BCB77" rx="4" />
            <text x="${startX + wRemain/2}" y="115" text-anchor="middle" fill="white" font-weight="bold">?</text>
            <rect x="${startX + wRemain}" y="90" width="${wRemove}" height="40" fill="#FF6B6B" rx="4" opacity="0.8" />
            <text x="${startX + wRemain + wRemove/2}" y="115" text-anchor="middle" fill="white" font-weight="bold">${data.remove}</text>
            <path d="M${startX + wRemain + wRemove/2},85 Q${startX + wRemain + wRemove/2 + 20},60 ${startX + wRemain + wRemove/2 + 50},70" fill="none" stroke="${strokeColor}" marker-end="url(#arrowhead)" />
            <text x="${startX + wRemain + wRemove/2 + 50}" y="60" text-anchor="middle" font-size="12">拿走</text>
            <path d="${drawBraceBottom(startX, 135, maxWidth)}" fill="none" stroke="${strokeColor}" stroke-width="2" />
            <text x="${width/2}" y="170" text-anchor="middle" font-size="14" font-weight="bold">共有 ${data.total} ${data.unit}</text>
            <defs>
              <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="${strokeColor}" /></marker>
            </defs>
          </svg>
        `;
      }

      if (type === 'compare_stacked') {
        const maxVal = Math.max(data.a, data.b);
        const maxWidth = 220;
        const wA = (data.a / maxVal) * maxWidth;
        const wB = (data.b / maxVal) * maxWidth;
        const startX = 70;
        return `
          <svg viewBox="0 0 ${width} ${height}" class="w-full h-full">
            <text x="${startX - 10}" y="85" text-anchor="end" font-size="14">A</text>
            <rect x="${startX}" y="65" width="${wA}" height="30" fill="#4D96FF" rx="4" />
            <text x="${startX + wA/2}" y="85" text-anchor="middle" fill="white">${data.a}${data.unit}</text>
            <text x="${startX - 10}" y="135" text-anchor="end" font-size="14">B</text>
            <rect x="${startX}" y="115" width="${wB}" height="30" fill="#FF6B6B" rx="4" />
            <text x="${startX + wB/2}" y="135" text-anchor="middle" fill="white">${data.b}${data.unit}</text>
            <line x1="${startX + Math.min(wA, wB)}" y1="65" x2="${startX + Math.min(wA, wB)}" y2="150" stroke="${strokeColor}" stroke-dasharray="4,4" />
            <line x1="${startX + Math.max(wA, wB)}" y1="65" x2="${startX + Math.max(wA, wB)}" y2="150" stroke="${strokeColor}" stroke-dasharray="4,4" />
            <text x="${startX + Math.min(wA, wB) + (Math.abs(wA - wB))/2}" y="135" text-anchor="middle" font-size="14" font-weight="bold">?</text>
            <text x="${startX + Math.min(wA, wB) + (Math.abs(wA - wB))/2}" y="160" text-anchor="middle" font-size="12" fill="${textColor}">相差</text>
          </svg>
        `;
      }

      if (type === 'multiple_bars') {
        const baseW = 60;
        const startX = 60;
        let multipleBar = "";
        if (Number.isInteger(data.multiple) && data.multiple <= 5) {
          multipleBar = Array.from({ length: data.multiple }).map((_, i) => `
            <rect x="${startX + i*(baseW+2)}" y="140" width="${baseW}" height="30" fill="#4D96FF" rx="4" opacity="0.8" />
          `).join('');
        } else {
          const totalW = baseW * data.multiple; 
          const displayW = Math.min(totalW, 250);
          multipleBar = `<rect x="${startX}" y="140" width="${displayW}" height="30" fill="#4D96FF" rx="4" opacity="0.8" />`;
        }
        return `
          <svg viewBox="0 0 ${width} ${height}" class="w-full h-full">
            <text x="${startX}" y="60" font-size="14" font-weight="bold">${data.item1}</text>
            <rect x="${startX}" y="70" width="${baseW}" height="30" fill="#FFE66D" stroke="${strokeColor}" stroke-width="2" rx="4" />
            <text x="${startX + baseW/2}" y="90" text-anchor="middle" font-size="14">${data.base}</text>
            <text x="${startX}" y="130" font-size="14" font-weight="bold">${data.item2}</text>
            ${multipleBar}
            <path d="${drawBraceBottom(startX, 175, Math.min(baseW * data.multiple, 250))}" fill="none" stroke="${strokeColor}" />
            <text x="${startX + Math.min(baseW * data.multiple, 250)/2}" y="205" text-anchor="middle" font-size="14" font-weight="bold">${data.multiple} 倍</text>
            <text x="300" y="160" text-anchor="middle" font-size="24" font-weight="bold" fill="#FF6B6B">?</text>
            <text x="300" y="180" text-anchor="middle" font-size="12" fill="${textColor}">${data.unit}</text>
          </svg>
        `;
      }

      if (type === 'division_bar') {
        const totalW = 240;
        const startX = (width - totalW)/2;
        const groupW = totalW / data.groups;
        return `
          <svg viewBox="0 0 ${width} ${height}" class="w-full h-full">
            <path d="${drawBraceTop(startX, 60, totalW)}" fill="none" stroke="${strokeColor}" />
            <text x="${width/2}" y="40" text-anchor="middle" font-size="16" font-weight="bold">全部 ${data.total} ${data.unit}</text>
            ${Array.from({ length: data.groups }).map((_, i) => `
              <rect x="${startX + i*groupW}" y="70" width="${groupW}" height="40" fill="#6BCB77" stroke="white" stroke-width="2" />
            `).join('')}
            <path d="${drawBraceBottom(startX, 115, groupW)}" fill="none" stroke="${strokeColor}" />
            <text x="${startX + groupW/2}" y="145" text-anchor="middle" font-size="18" font-weight="bold" fill="#FF6B6B">?</text>
            <text x="${width/2}" y="145" text-anchor="middle" font-size="12">平分成 ${data.groups} 段</text>
          </svg>
        `;
      }

      if (type === 'multiple_sum') {
        const baseW = 50;
        const startX = 60;
        const multipleBlocks = Array.from({ length: Math.min(data.multiple, 5) }).map((_, i) => `
           <rect x="${startX + i*(baseW+2)}" y="100" width="${baseW}" height="30" fill="#4D96FF" stroke="white" stroke-width="1" />
        `).join('');
        return `
          <svg viewBox="0 0 ${width} ${height}" class="w-full h-full">
            <rect x="${startX}" y="60" width="${baseW}" height="30" fill="#FFE66D" stroke="${strokeColor}" stroke-width="2" />
            <text x="${startX + baseW/2}" y="80" text-anchor="middle" font-size="12">${data.base}</text>
            <text x="${startX - 10}" y="80" text-anchor="end" font-size="12">${data.item1}</text>
            ${multipleBlocks}
            ${data.multiple > 5 ? `<text x="${startX + 5*baseW + 10}" y="120">...</text>` : ''}
            <text x="${startX - 10}" y="120" text-anchor="end" font-size="12">${data.item2}</text>
            <path d="${drawBraceRight(startX + Math.min(data.multiple, 5) * baseW + 20, 60, 70)}" fill="none" stroke="${strokeColor}" stroke-width="2" />
            <text x="${startX + Math.min(data.multiple, 5) * baseW + 60}" y="90" text-anchor="middle" font-size="20" font-weight="bold" fill="#FF6B6B">?</text>
            <text x="${startX + Math.min(data.multiple, 5) * baseW + 60}" y="110" text-anchor="middle" font-size="12">共多少</text>
          </svg>
        `;
      }

      if (type === 'fraction_bars') {
        const baseW = 100;
        const ratio = data.compare / data.base;
        const compareW = baseW * ratio;
        const displayCompareW = Math.min(compareW, 250); 
        const startX = 60;
        return `
          <svg viewBox="0 0 ${width} ${height}" class="w-full h-full">
            <text x="${startX - 10}" y="70" text-anchor="end" font-size="14" font-weight="bold">${data.item1}</text>
            <rect x="${startX}" y="50" width="${baseW}" height="30" fill="#E2E8F0" stroke="${strokeColor}" stroke-width="2" />
            <text x="${startX + baseW/2}" y="70" text-anchor="middle" font-size="12">1</text>
            <text x="${startX - 10}" y="120" text-anchor="end" font-size="14" font-weight="bold">${data.item2}</text>
            <rect x="${startX}" y="100" width="${displayCompareW}" height="30" fill="#9D4EDD" stroke="${strokeColor}" stroke-width="2" />
            <path d="${drawBraceBottom(startX, 135, displayCompareW)}" fill="none" stroke="${strokeColor}" />
            <text x="${startX + displayCompareW/2}" y="165" text-anchor="middle" font-size="18" font-weight="bold" fill="#FF6B6B">? 倍</text>
            <text x="${startX + baseW + 10}" y="70" font-size="12" fill="#64748B">${data.base}${data.unit}</text>
            <text x="${startX + displayCompareW + 10}" y="120" font-size="12" fill="#64748B">${data.compare}${data.unit}</text>
          </svg>
        `;
      }

      if (type === 'ratio_sum') {
        const baseW = 80;
        const multW = baseW * data.multiple;
        const displayMultW = Math.min(multW, 220);
        const startX = 60;
        return `
          <svg viewBox="0 0 ${width} ${height}" class="w-full h-full">
            <text x="${startX - 10}" y="70" text-anchor="end" font-size="14">${data.item1}</text>
            <rect x="${startX}" y="50" width="${baseW}" height="30" fill="#FFE66D" stroke="${strokeColor}" stroke-width="2" />
            <text x="${startX + baseW/2}" y="70" text-anchor="middle" font-size="12">1</text>
            <text x="${startX - 10}" y="120" text-anchor="end" font-size="14">${data.item2}</text>
            <rect x="${startX}" y="100" width="${displayMultW}" height="30" fill="#4D96FF" stroke="${strokeColor}" stroke-width="2" />
            <text x="${startX + displayMultW/2}" y="120" text-anchor="middle" font-size="12">${data.multiple} 倍</text>
            <text x="${startX + baseW/2}" y="45" text-anchor="middle" font-size="14" font-weight="bold" fill="#FF6B6B">?</text>
            <path d="${drawBraceRight(startX + Math.max(baseW, displayMultW) + 10, 50, 80)}" fill="none" stroke="${strokeColor}" stroke-width="2" />
            <text x="${startX + Math.max(baseW, displayMultW) + 50}" y="90" text-anchor="middle" font-size="14" font-weight="bold">和 ${data.sum}</text>
          </svg>
        `;
      }

      if (type === 'ratio_diff') {
         const baseW = 60;
         const multW = baseW * data.multiple;
         const displayMultW = Math.min(multW, 240);
         const startX = 60;
        return `
          <svg viewBox="0 0 ${width} ${height}" class="w-full h-full">
            <text x="${startX - 10}" y="70" text-anchor="end" font-size="14">${data.item1}</text>
            <rect x="${startX}" y="50" width="${baseW}" height="30" fill="#FFE66D" stroke="${strokeColor}" stroke-width="2" />
            <text x="${startX + baseW/2}" y="70" text-anchor="middle" font-size="12">1</text>
            <text x="${startX + baseW/2}" y="45" text-anchor="middle" font-size="14" font-weight="bold" fill="#FF6B6B">?</text>
            <text x="${startX - 10}" y="120" text-anchor="end" font-size="14">${data.item2}</text>
            <rect x="${startX}" y="100" width="${displayMultW}" height="30" fill="#4D96FF" stroke="${strokeColor}" stroke-width="2" />
            <text x="${startX + displayMultW/2}" y="120" text-anchor="middle" font-size="12">${data.multiple} 倍</text>
            <line x1="${startX + baseW}" y1="50" x2="${startX + baseW}" y2="140" stroke="${strokeColor}" stroke-dasharray="4,4" />
            <line x1="${startX + displayMultW}" y1="100" x2="${startX + displayMultW}" y2="140" stroke="${strokeColor}" stroke-dasharray="4,4" />
            <path d="${drawBraceBottom(startX + baseW, 140, displayMultW - baseW)}" fill="none" stroke="${strokeColor}" />
            <text x="${startX + baseW + (displayMultW - baseW)/2}" y="170" text-anchor="middle" font-size="14" font-weight="bold">差 ${data.diff}</text>
          </svg>
        `;
      }

      return `<div>圖形載入中...</div>`;
    }

    // --- 遊戲切換邏輯與控制 ---
    function startGame(level) {
      selectedLevel = level;
      const levelQuestions = ALL_QUESTIONS.filter(q => q.level === level);
      gameQuestions = shuffleArray(levelQuestions);
      currentScreen = 'game';
      currentQIndex = 0;
      score = 0;
      feedback = null;
      showHint = false;

      // 重設 AI 狀態
      aiExplanation = null;
      aiLoading = false;
      isSpeaking = false;
      window.speechSynthesis.cancel();

      render();
    }

    function handleAnswer(selectedVal) {
      if (feedback === 'correct') return;
      const currentQuestion = gameQuestions[currentQIndex];
      
      if (selectedVal === currentQuestion.answer) {
        feedback = 'correct';
        score += 10;
      } else {
        feedback = 'incorrect';
      }
      render();
    }

    function nextQuestion() {
      if (currentQIndex < gameQuestions.length - 1) {
        currentQIndex++;
        feedback = null;
        showHint = false;
        aiExplanation = null;
        aiLoading = false;
        isSpeaking = false;
        window.speechSynthesis.cancel();
        render();
      } else {
        currentScreen = 'summary';
        render();
      }
    }

    function goHome() {
      currentScreen = 'home';
      window.speechSynthesis.cancel();
      isSpeaking = false;
      render();
    }

              ? 'bg-green-400 text-white ring-4 ring-green-200 cursor-not-allowed' 
              : 'bg-slate-100 text-slate-400 cursor-not-allowed';
          } else if (feedback === 'incorrect') {
            btnClass = 'bg-white border-2 border-slate-100 text-slate-600 hover:border-blue-300 hover:text-blue-500';
          }

          return `
            <button
              onclick="handleAnswer(${opt})"
              ${feedback === 'correct' ? 'disabled' : ''}
              class="h-24 rounded-2xl text-3xl font-black shadow-md transition-all transform hover:scale-105 active:scale-95 ${btnClass}"
            >

        // 建立回饋區塊
        let feedbackHTML = '';
        if (feedback === 'correct') {
          feedbackHTML = `
            <div class="bg-gradient-to-r from-green-400 to-emerald-500 text-white rounded-3xl p-6 shadow-lg animate-fade-in">

                <div>
                  <h3 class="text-2xl font-black flex items-center"><i class="fa-solid fa-circle-check mr-2"></i> 太棒了！</h3>
                  <p class="opacity-90 font-medium mt-1">你的分析完全正確！</p>
                </div>
                <button onclick="nextQuestion()" class="bg-white text-green-600 px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-green-50 animate-bounce flex items-center gap-1.5">
                  下一題 <i class="fa-solid fa-arrow-right"></i>
                </button>
              </div>
            </div>
          `;
        } else if (feedback === 'incorrect') {
          feedbackHTML = `
            <div class="bg-white border-2 border-red-100 rounded-3xl p-6 shadow-lg animate-fade-in text-center">
              <h3 class="text-xl font-bold text-red-500 flex items-center justify-center mb-2">
                <i class="fa-solid fa-circle-xmark mr-2"></i> 再想一下喔
              </h3>
              <button onclick="showQuestionHint()" class="text-slate-500 underline text-sm hover:text-slate-700">
                ${showHint ? currentQuestion.hint : '點我看小提示'}
              </button>
            </div>
          `;
        }

        // AI Tutor 區塊
        let aiTutorHTML = '';
        if (!aiExplanation && !aiLoading) {
          aiTutorHTML = `
            <button onclick="handleAskAI()" class="w-full bg-gradient-to-r from-purple-400 to-pink-400 text-white font-bold py-3 px-6 rounded-2xl shadow-md hover:shadow-lg transform hover:-translate-y-1 transition-all flex items-center justify-center gap-2">
              <i class="fa-solid fa-wand-magic-sparkles animate-pulse"></i>
              <span>✨ 呼叫 AI 老師求解</span>
            </button>
          `;
        } else if (aiLoading) {
          aiTutorHTML = `
            <div class="w-full bg-white p-4 rounded-2xl shadow-sm border border-purple-100 flex items-center justify-center space-x-3 animate-pulse">
              <div class="w-3 h-3 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 0s"></div>
              <div class="w-3 h-3 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
              <div class="w-3 h-3 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
              <span class="text-purple-500 font-medium">AI 老師正在思考怎麼教你...</span>
            </div>
          `;
        } else if (aiExplanation) {
          aiTutorHTML = `
            <div class="w-full bg-white p-6 rounded-2xl shadow-md border-l-4 border-purple-400 animate-fade-in relative">
              <div class="flex justify-between items-start mb-2">
                 <h4 class="font-bold text-purple-600 flex items-center gap-1.5">
                   <i class="fa-solid fa-wand-magic-sparkles"></i> AI 老師的小撇步
                 </h4>
                 <button onclick="handleSpeak()" class="text-slate-400 hover:text-purple-500 transition-colors" title="朗讀解釋">
                   ${isSpeaking ? '<i class="fa-solid fa-circle-stop text-2xl text-red-500"></i>' : '<i class="fa-solid fa-volume-high text-xl"></i>'}
                 </button>
              </div>
              <p class="text-slate-600 leading-relaxed whitespace-pre-wrap text-sm md:text-base text-left">
                ${aiExplanation}
              </p>
            </div>
          `;
        }

        appContainer.innerHTML = `
          <div class="min-h-screen bg-[#F0F4F8] p-4 md:p-8 flex flex-col items-center animate-fade-in">
            <!-- 導覽列 -->
            <div class="w-full max-w-4xl flex justify-between items-center mb-6">
              <button onclick="goHome()" class="bg-white px-4 py-2 rounded-xl font-bold text-slate-500 shadow-sm hover:bg-slate-50 transition flex items-center gap-1.5">
                <i class="fa-solid fa-house"></i> 回首頁
              </button>
              <div class="flex items-center space-x-4">
                 <div class="bg-yellow-400 text-yellow-900 px-4 py-2 rounded-xl font-black shadow-sm flex items-center gap-1.5">
                   <i class="fa-solid fa-trophy"></i> <span>${score} 分</span>
                 </div>
                 <div class="bg-white text-slate-500 px-4 py-2 rounded-xl font-bold shadow-sm">
                   第 ${currentQIndex + 1} / ${gameQuestions.length} 題
                 </div>
                 <button onclick="toggleSettingsModal()" class="bg-white p-2.5 rounded-xl text-slate-400 hover:text-slate-600 shadow-sm border border-slate-100 transition" title="API 設定">
                   <i class="fa-solid fa-gear"></i>
                 </button>
              </div>
            </div>

            <!-- 主畫面內容雙欄排版 -->
            <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-6">
              <!-- 左欄：題目、圖形與 AI 區 -->
              <div class="flex flex-col space-y-4">
                <div class="bg-white rounded-3xl p-6 shadow-lg border-b-8 border-slate-100 relative overflow-hidden">
                   <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 to-purple-400"></div>
                   <h3 class="text-lg font-bold text-slate-400 mb-2 uppercase tracking-widest">${currentQuestion.context}</h3>
                   <h2 class="text-2xl font-black text-slate-800 mb-6 text-left">${currentQuestion.question}</h2>
                   
                   <!-- SVG 圖表繪製區 -->
                   <div class="w-full bg-slate-50 rounded-2xl p-4 md:p-8 border border-slate-100 flex items-center justify-center aspect-[4/3] md:aspect-video">
                      ${renderSvgDiagram(currentQuestion.svgType, currentQuestion.data)}
                   </div>

                   <div class="mt-4 flex items-start space-x-2 text-slate-500 bg-blue-50 p-3 rounded-xl text-left">
                     <i class="fa-solid fa-circle-question text-blue-400 mt-1 flex-shrink-0"></i>
                     <p class="text-sm">${currentQuestion.desc}</p>
                   </div>
                </div>
                
                <!-- AI 老師求解區 -->
                <div id="ai-tutor-box" class="w-full">
                  ${aiTutorHTML}
                </div>
              </div>

              <!-- 右欄：選項與作答反饋區 -->
              <div class="flex flex-col space-y-6 justify-between">
                <div class="bg-white rounded-3xl p-6 shadow-lg border-b-8 border-slate-100 flex-grow flex flex-col justify-center">
                   <h3 class="text-xl font-bold text-slate-700 mb-6 text-center">請選擇正確答案</h3>
                   <div class="grid grid-cols-2 gap-4">
                     ${optionsHTML}
                   </div>
                </div>

                <!-- 回饋訊息覆蓋區 -->
                <div id="feedback-box" class="w-full">
                  ${feedbackHTML}
                </div>
              </div>
            </div>

            <!-- 設計者頁尾 -->
            <footer class="mt-12 text-center text-xs text-slate-400">
              設計者：國立屏科實驗高級中等學校(國小部) 林敬修老師
            </footer>
          </div>
        `;
      } 
      
      else if (currentScreen === 'summary') {
        appContainer.innerHTML = `
          <div class="flex flex-col items-center justify-center min-h-screen bg-[#F0F4F8] p-4 animate-fade-in">
            <div class="bg-white p-8 md:p-12 rounded-[2rem] shadow-xl text-center max-w-lg w-full border-b-8 border-slate-200">
              <div class="w-24 h-24 bg-yellow-300 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner animate-bounce">
                <i class="fa-solid fa-trophy text-yellow-700 text-5xl"></i>
              </div>
              <h2 class="text-4xl font-black text-slate-800 mb-2">闖關成功！</h2>
              <p class="text-slate-500 mb-8 text-lg">你在這堂課中表現得非常出色！</p>
              
              <div class="bg-slate-50 rounded-2xl p-6 mb-8">
                <span class="text-sm text-slate-400 font-bold uppercase tracking-widest">總得分</span>
                <div class="text-6xl font-black text-blue-500 mt-2">${score}</div>
              </div>

              <button onclick="goHome()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold text-lg hover:bg-slate-700 transition shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                再玩一次
              </button>
            </div>

            <!-- 設計者頁尾 -->
            <footer class="mt-12 text-center text-xs text-slate-400">
              設計者：國立屏科實驗高級中等學校(國小部) 林敬修老師
            </footer>
          </div>
        `;
      }
    }

    function showQuestionHint() {
      showHint = true;
      render();
    }

    // --- 初始載入渲染 ---
    render();
  </script>
</body>
</html>
